<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vrai Ambilight Dynamique OBS</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Le conteneur qui délimite la zone de jeu */
        .ambilight-container {
            position: relative;
            width: 90vw; /* Ajuste la taille du cadre ici */
            height: 50.6vw; /* Ratio 16:9 */
            /* box-shadow optionnel pour marquer le bord intérieur */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); 
        }

        /* Structure pour les lumières projetées */
        .lights-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; /* Derrière le jeu */
            /* Le secret du réalisme : un flou très intense et une saturation boostée */
            filter: blur(100px) saturate(250%) brightness(1.3);
            transform: scale(1.15); /* Pour que la lumière dépasse largement */
            display: grid;
            /* Grille pour placer les 4 lumières */
            grid-template-areas: 
                ". top ."
                "left . right"
                ". bottom .";
            grid-template-columns: 20% 60% 20%;
            grid-template-rows: 20% 60% 20%;
        }

        /* Style commun des sources lumineuses */
        .light {
            width: 100%; height: 100%;
            transition: background-color 0.1s ease-out;
            border-radius: 50%; /* Pour des halos ronds qui se mélangent mieux */
        }

        /* Positionnement des lumières */
        #light-top    { grid-area: top; }
        #light-bottom { grid-area: bottom; }
        #light-left   { grid-area: left; }
        #light-right  { grid-area: right; }

        /* Interface de setup OBS (obligatoire) */
        #setup-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; cursor: pointer; font-family: sans-serif;
        }
        .instruction { font-size: 22px; font-weight: bold; border: 2px solid #fff; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="setup-layer">
        <div class="instruction">CLIQUEZ POUR ACTIVER L'AMBILIGHT</div>
        <p style="margin-top:10px; font-size:12px;">(Clic-droit > Interagir dans OBS)</p>
    </div>
    
    <div class="ambilight-container">
        <div class="lights-layer">
            <div id="light-top" class="light"></div>
            <div id="light-bottom" class="light"></div>
            <div id="light-left" class="light"></div>
            <div id="light-right" class="light"></div>
        </div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        const lights = {
            top: document.getElementById('light-top'),
            bottom: document.getElementById('light-bottom'),
            left: document.getElementById('light-left'),
            right: document.getElementById('light-right')
        };
        const setupLayer = document.getElementById('setup-layer');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        setupLayer.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "never" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.play();
                
                setupLayer.style.display = 'none';

                video.onloadedmetadata = () => {
                    // Analyse en ultra basse résolution pour la performance
                    const dw = 32; const dh = 18;
                    canvas.width = dw; canvas.height = dh;
                    
                    function update() {
                        if (video.paused || video.ended) return;
                        ctx.drawImage(video, 0, 0, dw, dh);
                        
                        // Analyse Zone par Zone
                        // 1. TOP (Haut) : Ligne du haut
                        lights.top.style.backgroundColor = getAverageColor(ctx.getImageData(0, 0, dw, 2).data);
                        
                        // 2. BOTTOM (Bas) : Ligne du bas
                        lights.bottom.style.backgroundColor = getAverageColor(ctx.getImageData(0, dh-2, dw, 2).data);
                        
                        // 3. LEFT (Gauche) : Colonne de gauche
                        lights.left.style.backgroundColor = getAverageColor(ctx.getImageData(0, 0, 2, dh).data);
                        
                        // 4. RIGHT (Droite) : Colonne de droite
                        lights.right.style.backgroundColor = getAverageColor(ctx.getImageData(dw-2, 0, 2, dh).data);
                        
                        requestAnimationFrame(update);
                    }
                    update();
                };
            } catch (err) { console.error(err); }
        };

        // Fonction pour calculer la couleur moyenne d'une zone de pixels
        function getAverageColor(data) {
            let r = 0, g = 0, b = 0;
            const count = data.length / 4;
            // On saute des pixels pour aller encore plus vite (i += 8 au lieu de 4)
            for (let i = 0; i < data.length; i += 8) {
                r += data[i];
                g += data[i+1];
                b += data[i+2];
            }
            const realCount = count / 2; // Ajustement car on saute des pixels
            return `rgb(${Math.round(r/realCount)}, ${Math.round(g/realCount)}, ${Math.round(b/realCount)})`;
        }
    </script>
</body>
</html>
