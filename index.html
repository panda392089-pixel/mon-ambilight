<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        /* Conteneur de la lueur */
        #ambilight {
            position: absolute;
            top: 5%; left: 5%; width: 90%; height: 90%;
            filter: blur(100px); /* Augmente le flou pour l'effet réaliste */
            z-index: 1;
            opacity: 0; /* Caché au début */
            transition: opacity 0.5s;
        }

        /* Bouton pour OBS (Interagir) */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background: rgba(255,255,255,0.8);
            border: none; cursor: pointer; border-radius: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button id="start-btn">CLIQUE ICI (OBS > Interagir)</button>
    <div id="ambilight"></div>
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const ambilight = document.getElementById('ambilight');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                // Demander la source vidéo (Fenêtre de jeu ou Écran)
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1280, height: 720 },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none'; // Cache le bouton
                ambilight.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 16; // Très basse résolution pour la performance
                    canvas.height = 9;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // Extraction simplifiée des couleurs moyennes
                    const colors = [];
                    for (let i = 0; i < data.length; i += 4) {
                        colors.push(`rgb(${data[i]},${data[i+1]},${data[i+2]})`);
                    }

                    // Création de l'ombre portée géante (effet Ambilight)
                    // On utilise box-shadow car c'est plus performant que 4 gradients
                    ambilight.style.boxShadow = `
                        -100px -100px 150px ${colors[0]}, 
                        100px -100px 150px ${colors[15]},
                        -100px 100px 150px ${colors[128]},
                        100px 100px 150px ${colors[143]}
                    `;
                    ambilight.style.background = colors[72]; // Couleur centrale

                    requestAnimationFrame(render);
                }
            } catch (err) {
                alert("Erreur de capture : " + err);
            }
        };
    </script>
</body>
</html>
