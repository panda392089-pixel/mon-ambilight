<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Gaming Pro - Circular Glow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        /* Conteneur principal */
        #ambilight-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
            transform: translateZ(0);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Zones de lumière circulaires */
        .glow-zone {
            position: absolute;
            border-radius: 50%; /* Forme circulaire */
            filter: blur(80px); /* Flou directionnel */
            opacity: 0.7;
            will-change: background;
            transition: background 0.1s linear; /* Léger lissage pour éviter le flickering */
        }

        /* Configuration des projecteurs */
        /* Le TOP est agrandi pour projeter vers le plafond */
        #z-top { 
            top: -20vh; 
            width: 120vw; 
            height: 60vh; 
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
        }

        #z-left { 
            left: -15vw; 
            width: 50vw; 
            height: 80vh; 
        }

        #z-right { 
            right: -15vw; 
            width: 50vw; 
            height: 80vh; 
        }

        #z-bottom { 
            bottom: -15vh; 
            width: 100vw; 
            height: 40vh; 
        }

        /* Interface */
        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }

        button {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
        }

        button:hover { background: white; color: black; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">DÉMARRER L'IMMERSION</button>
        <p style="color: #666; margin-top: 15px; font-family: sans-serif;">La lumière sera projetée circulairement</p>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true, willReadFrequently: true });

        const zones = {
            'z-top':    { x: 1, y: 0 },
            'z-left':   { x: 0, y: 1 },
            'z-right':  { x: 2, y: 1 },
            'z-bottom': { x: 1, y: 2 }
        };

        const SATURATION_BOOST = 1.6; // Augmenté pour compenser le flou circulaire

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 128, height: 72, frameRate: 60 },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.play();

                document.getElementById('ui-layer').style.display = 'none';

                video.onplaying = () => {
                    canvas.width = 3;
                    canvas.height = 3;
                    renderLoop();
                };

                function renderLoop() {
                    if (video.paused || video.ended) return;

                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    for (let id in zones) {
                        const z = zones[id];
                        const i = (z.y * 3 + z.x) * 4;

                        let r = data[i], g = data[i+1], b = data[i+2];

                        // Saturation
                        const gray = 0.2989 * r + 0.5870 * g + 0.1140 * b;
                        r = Math.max(0, Math.min(255, gray + (r - gray) * SATURATION_BOOST));
                        g = Math.max(0, Math.min(255, gray + (g - gray) * SATURATION_BOOST));
                        b = Math.max(0, Math.min(255, gray + (b - gray) * SATURATION_BOOST));

                        // Mise à jour avec gradient radial pour l'effet circulaire
                        const el = document.getElementById(id);
                        el.style.background = `radial-gradient(circle, rgba(${r},${g},${b},0.9) 0%, rgba(${r},${g},${b},0) 80%)`;
                    }

                    requestAnimationFrame(renderLoop);
                }
            } catch (err) {
                console.error("Erreur : ", err);
            }
        };
    </script>
</body>
</html>
