<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Effect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent; /* Fond transparent pour OBS */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 80vw; /* Taille de la fenêtre de jeu */
            aspect-ratio: 16 / 9;
            z-index: 10;
        }

        /* L'effet de lueur */
        #ambilight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px); /* Ajuste le flou ici */
            opacity: 0.8;
            transform: scale(1.2); /* Pour que la lueur dépasse sur les côtés */
        }

        canvas {
            display: none; /* Canvas caché servant au calcul des couleurs */
        }

        #game-placeholder {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255,255,255,0.1);
            /* Ce rectangle sera remplacé par ta source de jeu dans OBS */
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="ambilight"></div>
        <div id="game-placeholder"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const ambilight = document.getElementById('ambilight');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        async function initAmbilight() {
            try {
                // Demande la capture d'écran/fenêtre (nécessaire pour le live)
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "never" },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                video.addEventListener('playing', () => {
                    canvas.width = 64; // Basse résolution pour booster les perfs
                    canvas.height = 36;
                    update();
                });

                function update() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Récupération des couleurs moyennes des bords
                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // On crée un gradient basé sur les pixels du flux
                    const topLeft = getRGB(frame, 0, 0);
                    const topRight = getRGB(frame, canvas.width - 1, 0);
                    const bottomLeft = getRGB(frame, 0, canvas.height - 1);
                    const bottomRight = getRGB(frame, canvas.width - 1, canvas.height - 1);

                    ambilight.style.background = `
                        linear-gradient(to right, ${topLeft}, ${topRight}),
                        linear-gradient(to bottom, ${topRight}, ${bottomRight}),
                        linear-gradient(to left, ${bottomRight}, ${bottomLeft}),
                        linear-gradient(to top, ${bottomLeft}, ${topLeft})
                    `;
                    ambilight.style.backgroundBlendMode = "screen";

                    requestAnimationFrame(update);
                }
            } catch (err) {
                console.error("Erreur : " + err);
            }
        }

        function getRGB(data, x, y) {
            const index = (y * 64 + x) * 4;
            return `rgb(${data[index]}, ${data[index+1]}, ${data[index+2]})`;
        }

        // Lancer au clic (nécessaire pour les permissions navigateur)
        window.onclick = () => initAmbilight();
    </script>
</body>
</html>
