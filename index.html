<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Force Symétrie</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        /* Conteneur global */
        #ambilight-root {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* Chaque face a sa propre div pour une indépendance totale */
        .glow-zone {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px); /* Flou ultra large pour la douceur */
            opacity: 0.7;
            mix-blend-mode: screen; /* Mélange mieux les couleurs sur fond sombre */
        }

        #glow-top { top: -10vh; width: 80vw; height: 20vh; }
        #glow-left { left: -10vw; width: 20vw; height: 80vh; }
        #glow-right { right: -10vw; width: 20vw; height: 80vh; }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: #222; color: #fff; z-index: 1000;
        }

        /* Debug : Affiche ce que le script voit (à supprimer après test) */
        #debug-canvas {
            position: fixed; bottom: 10px; left: 10px; 
            border: 1px solid red; z-index: 1000; width: 200px;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER LE MODE SYMÉTRIQUE</button>
    
    <div id="ambilight-root">
        <div id="glow-top" class="glow-zone"></div>
        <div id="glow-left" class="glow-zone"></div>
        <div id="glow-right" class="glow-zone"></div>
    </div>

    <canvas id="debug-canvas"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const gTop = document.getElementById('glow-top');
        const gLeft = document.getElementById('glow-left');
        const gRight = document.getElementById('glow-right');
        const canvas = document.getElementById('debug-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                btn.style.display = 'none';

                video.onplaying = () => {
                    canvas.width = 32;
                    canvas.height = 18;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // On prend des moyennes sur des zones larges
                    const cTop = getAvg(pixels, 8, 24, 0, 4);    // Haut centre
                    const cLeft = getAvg(pixels, 0, 6, 4, 14);   // Bord gauche
                    const cRight = getAvg(pixels, 26, 32, 4, 14); // Bord droit

                    // Application directe sur le background pour éviter les bugs de box-shadow
                    gTop.style.background = cTop;
                    gTop.style.boxShadow = `0 0 100px 50px ${cTop}`;
                    
                    gLeft.style.background = cLeft;
                    gLeft.style.boxShadow = `0 0 100px 50px ${cLeft}`;
                    
                    gRight.style.background = cRight;
                    gRight.style.boxShadow = `0 0 100px 50px ${cRight}`;

                    requestAnimationFrame(render);
                }

                function getAvg(data, xS, xE, yS, yE) {
                    let r = 0, g = 0, b = 0, count = 0;
                    for (let y = yS; y < yE; y++) {
                        for (let x = xS; x < xE; x++) {
                            const i = (y * canvas.width + x) * 4;
                            r += data[i]; g += data[i+1]; b += data[i+2];
                            count++;
                        }
                    }
                    return `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
                }
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
