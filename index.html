<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambilight Gaming Ultra Reactive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
height:100vh;
width:100vw;
}

/* conteneur lumière */

#ambilight-wrapper{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
z-index:-1;
}

/* halos */

.glow-zone{
position:absolute;
opacity:0.95;
mix-blend-mode:screen;
will-change:background;
}

/* projection plafond */

#z-top{
top:-25vh;
left:-15vw;
width:130vw;
height:70vh;
}

/* projection gauche */

#z-left{
top:-10vh;
left:-25vw;
width:70vw;
height:120vh;
}

/* projection droite */

#z-right{
top:-10vh;
right:-25vw;
width:70vw;
height:120vh;
}

/* projection bas */

#z-bottom{
bottom:-25vh;
left:-15vw;
width:130vw;
height:70vh;
}

/* interface */

#ui-layer{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

button{
padding:18px 40px;
font-size:18px;
background:transparent;
border:2px solid white;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
color:black;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div id="ui-layer">
<button id="start-btn">DÉMARRER AMBILIGHT</button>
<p style="color:#888;margin-top:15px;font-family:sans-serif;">
Sélectionnez votre écran de jeu
</p>
</div>

<div id="ambilight-wrapper">

<div id="z-top" class="glow-zone"></div>
<div id="z-left" class="glow-zone"></div>
<div id="z-right" class="glow-zone"></div>
<div id="z-bottom" class="glow-zone"></div>

</div>

<canvas id="procCanvas"></canvas>

<script>

const btn = document.getElementById("start-btn")

const canvas = document.getElementById("procCanvas")

const ctx = canvas.getContext("2d",{
alpha:false,
desynchronized:true,
willReadFrequently:true
})

/* cache DOM */

const elements={
top:document.getElementById("z-top"),
left:document.getElementById("z-left"),
right:document.getElementById("z-right"),
bottom:document.getElementById("z-bottom")
}

/* zones */

const zones={
top:{x:1,y:0},
left:{x:0,y:1},
right:{x:2,y:1},
bottom:{x:1,y:2}
}

const SATURATION_BOOST=1.6

btn.onclick=async()=>{

try{

const stream=await navigator.mediaDevices.getDisplayMedia({

video:{
width:{ideal:64},
height:{ideal:36},
frameRate:{ideal:60}
},

audio:false

})

const video=document.createElement("video")

video.srcObject=stream
video.muted=true

await video.play()

document.getElementById("ui-layer").style.display="none"

canvas.width=3
canvas.height=3

video.requestVideoFrameCallback(renderLoop)

/* boucle ultra rapide */

function renderLoop(){

if(video.paused||video.ended) return

ctx.drawImage(video,0,0,3,3)

const data=ctx.getImageData(0,0,3,3).data

for(let id in zones){

const z=zones[id]

const i=(z.y*3+z.x)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

const gray=0.2989*r+0.587*g+0.114*b

r=Math.max(0,Math.min(255,gray+(r-gray)*SATURATION_BOOST))
g=Math.max(0,Math.min(255,gray+(g-gray)*SATURATION_BOOST))
b=Math.max(0,Math.min(255,gray+(b-gray)*SATURATION_BOOST))

const el=elements[id]

el.style.background=`radial-gradient(
circle at center,
rgba(${r},${g},${b},0.9) 0%,
rgba(${r},${g},${b},0.6) 25%,
rgba(${r},${g},${b},0.35) 45%,
rgba(${r},${g},${b},0.15) 60%,
rgba(${r},${g},${b},0) 80%
)`

}

video.requestVideoFrameCallback(renderLoop)

}

}catch(err){

console.error("Erreur capture :",err)

}

}

</script>

</body>
</html>
