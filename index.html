<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Final</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        
        #ambilight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Le GPU gère le flou et la saturation de manière native */
            filter: blur(80px) saturate(1.8);
            transform: scale(1.15); /* Plus grand scale pour cacher les bords lors du flou */
            image-rendering: low-quality; /* Indique au moteur de ne pas lisser inutilement */
        }

        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        button { 
            padding: 15px 30px; background: rgba(0,0,0,0.7); 
            border: 1px solid #fff; color: #fff; cursor: pointer; 
            font-family: sans-serif; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui"><button id="btn">LANCER L'IMMERSION</button></div>
    <canvas id="ambilight"></canvas>

    <script>
        const btn = document.getElementById("btn");
        const canvas = document.getElementById("ambilight");
        // 'desynchronized: true' réduit la latence et libère le CPU en sautant la synchro verticale classique
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

        const start = async () => {
            try {
                // Capture en 480p (ratio 16:9) mais avec un débit d'images limité
                // Capturer en 128px peut parfois bugger sur certains drivers, 640x360 est le "sweet spot".
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 640, height: 360, frameRate: 24 } // 24 FPS suffit pour un effet de lumière fluide
                });

                const video = document.createElement("video");
                video.srcObject = stream;
                video.muted = true;
                await video.play();

                document.getElementById("ui").style.display = "none";
                
                // Le canvas interne reste minuscule pour que le GPU ne traite que peu de pixels
                canvas.width = 160;
                canvas.height = 90;

                const draw = () => {
                    const w = canvas.width;
                    const h = canvas.height;

                    // On dessine l'image entière une seule fois, très étirée.
                    // C'est l'optimisation ultime : au lieu de 4 zones, on dessine tout 
                    // et on laisse le flou CSS recréer l'ambiance des bords.
                    ctx.drawImage(video, 0, 0, w, h);

                    // Utilisation de requestAnimationFrame pour coller au rafraîchissement d'OBS
                    requestAnimationFrame(draw);
                };
                draw();
            } catch (e) { console.error("Erreur d'accès écran : ", e); }
        };

        btn.onclick = start;
        // Auto-click pour Touch Portal
        window.onload = () => setTimeout(() => btn.click(), 500);
    </script>
</body>
</html>
