<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Optimisé - Rendu Original</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Conteneur principal avec flou matériel (GPU) */
        #ambilight-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            filter: blur(100px); /* Le GPU gère le flou ici */
            transform: scale(1.2); /* Pour éviter les bords nets */
        }

        /* Chaque zone est en réalité une copie de la vidéo */
        .glow-zone {
            position: absolute;
            overflow: hidden;
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        /* On force la vidéo à déborder pour ne voir que le bord concerné */
        video {
            position: absolute;
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        /* Placement des 4 zones comme dans ton design original */
        #z-top { top: -10%; left: 10%; width: 80%; height: 40%; }
        #z-bottom { bottom: -10%; left: 10%; width: 80%; height: 40%; }
        #z-left { top: 10%; left: -10%; width: 40%; height: 80%; }
        #z-right { top: 10%; right: -10%; width: 40%; height: 80%; }

        /* Pour chaque zone, on centre la vidéo différemment pour simuler l'ambilight */
        #z-top video { transform: scale(1.5); top: -25%; }
        #z-bottom video { transform: scale(1.5); bottom: -25%; }
        #z-left video { transform: scale(1.5); left: -25%; }
        #z-right video { transform: scale(1.5); right: -25%; }

        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">ACTIVER L'IMMERSION</button>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>

    <script>
        const btn = document.getElementById("start-btn");
        const zones = document.querySelectorAll('.glow-zone');

        const activerAmbilight = async () => {
            try {
                // On demande une résolution très faible pour la capture
                // car on va de toute façon la flouter à mort.
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 160, height: 90, frameRate: 30 }
                });

                document.getElementById("ui-layer").style.display = "none";

                // On crée une seule balise vidéo "maître"
                const masterVideo = document.createElement("video");
                masterVideo.srcObject = stream;
                masterVideo.muted = true;
                await masterVideo.play();

                // On clone la vidéo dans chaque zone
                zones.forEach(zone => {
                    const v = masterVideo.cloneNode();
                    v.srcObject = stream;
                    v.play();
                    zone.appendChild(v);
                });

            } catch (e) {
                console.error("Erreur:", e);
            }
        };

        btn.onclick = activerAmbilight;

        window.onload = () => {
            setTimeout(() => btn.click(), 500);
        };
    </script>
</body>
</html>
