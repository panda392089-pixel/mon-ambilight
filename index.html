<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambilight Gaming 8 Zones</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
overflow:hidden;
height:100vh;
width:100vw;
}

#ambilight-wrapper{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
z-index:-1;
}

.glow{
position:absolute;
opacity:0.95;
mix-blend-mode:screen;
will-change:background;
}

/* haut */

#top{
top:-35vh;
left:-20vw;
width:140vw;
height:80vh;
}

/* bas */

#bottom{
bottom:-35vh;
left:-20vw;
width:140vw;
height:80vh;
}

/* gauche */

#left{
left:-35vw;
top:-10vh;
width:80vw;
height:120vh;
}

/* droite */

#right{
right:-35vw;
top:-10vh;
width:80vw;
height:120vh;
}

/* coins */

#top-left{
top:-30vh;
left:-30vw;
width:80vw;
height:80vh;
}

#top-right{
top:-30vh;
right:-30vw;
width:80vw;
height:80vh;
}

#bottom-left{
bottom:-30vh;
left:-30vw;
width:80vw;
height:80vh;
}

#bottom-right{
bottom:-30vh;
right:-30vw;
width:80vw;
height:80vh;
}

/* UI */

#ui{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

button{
padding:18px 40px;
font-size:18px;
background:transparent;
border:2px solid white;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
color:black;
}

canvas{display:none;}

</style>
</head>

<body>

<div id="ui">
<button id="start">DÉMARRER AMBILIGHT</button>
<p style="color:#888;margin-top:15px;font-family:sans-serif">
Sélectionnez votre écran
</p>
</div>

<div id="ambilight-wrapper">

<div id="top" class="glow"></div>
<div id="bottom" class="glow"></div>
<div id="left" class="glow"></div>
<div id="right" class="glow"></div>

<div id="top-left" class="glow"></div>
<div id="top-right" class="glow"></div>
<div id="bottom-left" class="glow"></div>
<div id="bottom-right" class="glow"></div>

</div>

<canvas id="c"></canvas>

<script>

const btn=document.getElementById("start")

const canvas=document.getElementById("c")

const ctx=canvas.getContext("2d",{
alpha:false,
desynchronized:true,
willReadFrequently:true
})

const el={
top:document.getElementById("top"),
bottom:document.getElementById("bottom"),
left:document.getElementById("left"),
right:document.getElementById("right"),
tl:document.getElementById("top-left"),
tr:document.getElementById("top-right"),
bl:document.getElementById("bottom-left"),
br:document.getElementById("bottom-right")
}

const zones={
tl:{x:0,y:0},
top:{x:1,y:0},
tr:{x:2,y:0},
left:{x:0,y:1},
right:{x:2,y:1},
bl:{x:0,y:2},
bottom:{x:1,y:2},
br:{x:2,y:2}
}

const SAT=1.6

btn.onclick=async()=>{

const stream=await navigator.mediaDevices.getDisplayMedia({

video:{
width:{ideal:64},
height:{ideal:36},
frameRate:{ideal:60}
},

audio:false

})

const video=document.createElement("video")
video.srcObject=stream
video.muted=true

await video.play()

document.getElementById("ui").style.display="none"

canvas.width=3
canvas.height=3

video.requestVideoFrameCallback(loop)

function loop(){

ctx.drawImage(video,0,0,3,3)

const data=ctx.getImageData(0,0,3,3).data

for(let k in zones){

const z=zones[k]

const i=(z.y*3+z.x)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

const gray=0.2989*r+0.587*g+0.114*b

r=gray+(r-gray)*SAT
g=gray+(g-gray)*SAT
b=gray+(b-gray)*SAT

el[k].style.background=`radial-gradient(circle,
rgba(${r},${g},${b},0.95) 0%,
rgba(${r},${g},${b},0.6) 30%,
rgba(${r},${g},${b},0.25) 55%,
rgba(${r},${g},${b},0.08) 70%,
rgba(${r},${g},${b},0) 100%)`

}

video.requestVideoFrameCallback(loop)

}

}

</script>

</body>
</html>
