<!DOCTYPE html>
<html lang="fr">
<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .ambilight-container {
            position: relative;
            width: 80vw; /* Ajuste la taille de ton jeu ici */
            height: 45vw; /* Ratio 16:9 */
            box-shadow: 0 0 50px 30px rgba(0,0,0,0.5);
        }

        /* L'élément qui crée l'effet de lumière */
        .glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Le flou intense crée l'effet diffuseur */
            filter: blur(80px) brightness(1.5) saturate(200%);
            transform: scale(1.1); /* Pour que la lumière dépasse du cadre */
        }

        video, canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="ambilight-container">
        <div id="glow" class="glow"></div>
        
        <div id="game-placeholder" style="background: #000; width:100%; height:100%;">
            </div>
    </div>

</body>
</html>
