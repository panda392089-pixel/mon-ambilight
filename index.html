<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Diffusion</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Le conteneur ne doit pas rogner les débordements (pas d'overflow hidden ici) */
        #ambilight-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            /* Le flou est appliqué ici sur tout le groupe pour une fusion parfaite */
            filter: blur(120px); 
        }

        .glow-zone {
            position: absolute;
            border-radius: 50%; /* Forme circulaire parfaite */
            opacity: 0.7;
            mix-blend-mode: screen;
            will-change: background;
        }

        /* On place les centres HORS de l'écran pour que seule la "traine" lumineuse rentre */
        #z-top {
            top: -20%; left: 10%;
            width: 80%; height: 40%;
        }

        #z-left {
            top: 10%; left: -20%;
            width: 40%; height: 80%;
        }

        #z-right {
            top: 10%; right: -20%;
            width: 40%; height: 80%;
        }

        #z-bottom {
            bottom: -20%; left: 10%;
            width: 80%; height: 40%;
        }

        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: white;
            font-family: sans-serif;
        }

        button {
            padding: 15px 30px;
            background: none;
            border: 2px solid white;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">ACTIVER L'IMMERSION TOTALE</button>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const canvas = document.getElementById("procCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const elements = {
            top: document.getElementById("z-top"),
            left: document.getElementById("z-left"),
            right: document.getElementById("z-right"),
            bottom: document.getElementById("z-bottom")
        };
        const zones = {
            top: { x: 1, y: 0 },
            left: { x: 0, y: 1 },
            right: { x: 2, y: 1 },
            bottom: { x: 1, y: 2 }
        };

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 32, height: 18, frameRate: 60 }
                });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                canvas.width = 3;
                canvas.height = 3;

                const render = () => {
                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    for (let id in zones) {
                        const i = (zones[id].y * 3 + zones[id].x) * 4;
                        // On utilise directement la couleur pleine, le filter:blur(120px) fera le reste
                        elements[id].style.backgroundColor = `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
                    }
                    video.requestVideoFrameCallback(render);
                };
                video.requestVideoFrameCallback(render);
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
