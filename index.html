<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Ultra Équilibré</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        #ambilight-container {
            position: absolute;
            top: 10vh; left: 10vw;
            width: 80vw; height: 80vh;
            z-index: 1;
            opacity: 0; 
            transition: opacity 1s;
            border-radius: 50%; /* Aide à la fusion circulaire */
        }

        #ambilight-glow {
            width: 100%; height: 100%;
            filter: blur(100px); /* Flou massif pour la douceur */
        }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: #111; color: white;
            border: 1px solid #444; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER AMBILIGHT ÉQUILIBRÉ</button>
    <div id="ambilight-container"><div id="ambilight-glow"></div></div>
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const glow = document.getElementById('ambilight-glow');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none'; 
                document.getElementById('ambilight-container').style.opacity = '1';

                video.onplaying = () => {
                    // Petite résolution pour moyenner naturellement les couleurs
                    canvas.width = 20; 
                    canvas.height = 12;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // On analyse des zones (bandes) pour être sûr de capter la couleur
                    const cTop    = getZoneAvg(pixels, 5, 15, 0, 3);   // Bande haute centrale
                    const cLeft   = getZoneAvg(pixels, 0, 4, 3, 9);    // Bande gauche centrale
                    const cRight  = getZoneAvg(pixels, 16, 20, 3, 9);  // Bande droite centrale

                    glow.style.boxShadow = `
                        /* HAUT */
                        0px -15vh 400px 10vw ${cTop},
                        /* GAUCHE */
                        -20vw 0px 400px 10vh ${cLeft},
                        /* DROITE */
                        20vw 0px 400px 10vh ${cRight}
                    `;

                    requestAnimationFrame(render);
                }

                // Fonction pour calculer la moyenne d'un rectangle de pixels
                function getZoneAvg(data, xStart, xEnd, yStart, yEnd) {
                    let r = 0, g = 0, b = 0, count = 0;
                    for (let y = yStart; y < yEnd; y++) {
                        for (let x = xStart; x < xEnd; x++) {
                            const i = (y * canvas.width + x) * 4;
                            r += data[i];
                            g += data[i+1];
                            b += data[i+2];
                            count++;
                        }
                    }
                    // On booste un peu la saturation pour la douceur (0.7 d'opacité)
                    return `rgba(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)}, 0.7)`;
                }

            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
