<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Final</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        
        #ambilight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Le flou est appliqué globalement sur le canvas par le GPU */
            filter: blur(100px) saturate(1.5);
            transform: scale(1.1);
        }

        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        button { padding: 15px 30px; background: none; border: 2px solid #fff; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui"><button id="btn">ACTIVER L'IMMERSION</button></div>
    <canvas id="ambilight"></canvas>

    <script>
        const btn = document.getElementById("btn");
        const canvas = document.getElementById("ambilight");
        const ctx = canvas.getContext("2d", { alpha: false });

        const start = async () => {
            try {
                // On capture en résolution MINIME (le CPU ne force pas du tout)
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 128, height: 72, frameRate: 30 }
                });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui").style.display = "none";
                
                // Résolution interne du canvas très basse pour le GPU
                canvas.width = 128;
                canvas.height = 72;

                const draw = () => {
                    const w = canvas.width;
                    const h = canvas.height;

                    // On dessine la vidéo 4 fois de manière stratégique
                    // Pas de lecture de pixels, juste du "blitting" (copie de texture)
                    
                    // Zone HAUT
                    ctx.drawImage(video, 0, 0, w, h/3, 0, 0, w, h/3);
                    // Zone BAS
                    ctx.drawImage(video, 0, h*0.7, w, h/3, 0, h*0.7, w, h/3);
                    // Zone GAUCHE
                    ctx.drawImage(video, 0, 0, w/4, h, 0, 0, w/4, h);
                    // Zone DROITE
                    ctx.drawImage(video, w*0.7, 0, w/4, h, w*0.7, 0, w/4, h);

                    requestAnimationFrame(draw);
                };
                draw();
            } catch (e) { console.error(e); }
        };

        btn.onclick = start;
        window.onload = () => setTimeout(() => btn.click(), 500);
    </script>
</body>
</html>
