<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ambilight PRO</title>

<style>

body{
margin:0;
overflow:hidden;
background:transparent;
}

#wrap{
position:absolute;
top:-25vh;
left:-25vw;
width:150vw;
height:150vh;
pointer-events:none;
}

.glow{
position:absolute;
width:70vw;
height:70vh;
mix-blend-mode:screen;
filter:blur(160px);
opacity:.95;
will-change:background;
}

/* TOP */
#z0{top:0; left:10vw}
#z1{top:0; left:40vw}
#z2{top:0; left:70vw}

/* LEFT */
#z3{left:0; top:20vh}
#z4{left:0; top:50vh}
#z5{left:0; top:80vh}

/* RIGHT */
#z6{right:0; top:20vh}
#z7{right:0; top:50vh}
#z8{right:0; top:80vh}

/* BOTTOM */
#z9{bottom:0; left:10vw}
#z10{bottom:0; left:40vw}
#z11{bottom:0; left:70vw}

#btn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 30px;
background:#000;
color:#fff;
border:1px solid #fff;
cursor:pointer;
z-index:999;
}

</style>
</head>

<body>

<button id="btn">ACTIVER AMBILIGHT PRO</button>

<div id="wrap"></div>

<canvas id="c" style="display:none"></canvas>

<script>

const SIZE = 12

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d",{alpha:false,desynchronized:true})

canvas.width = SIZE
canvas.height = SIZE

const wrap = document.getElementById("wrap")

const zones = []

function addZone(id,x,y){

const div=document.createElement("div")
div.className="glow"
div.id="z"+id
wrap.appendChild(div)

zones.push({
id:"z"+id,
x:x,
y:y,
color:[0,0,0]
})

}

/* 12 zones */

addZone(0,1,0)
addZone(1,6,0)
addZone(2,10,0)

addZone(3,0,3)
addZone(4,0,6)
addZone(5,0,10)

addZone(6,11,3)
addZone(7,11,6)
addZone(8,11,10)

addZone(9,1,11)
addZone(10,6,11)
addZone(11,10,11)

const btn = document.getElementById("btn")

btn.onclick = async ()=>{

const stream = await navigator.mediaDevices.getDisplayMedia({
video:{
width:160,
height:90,
frameRate:60
}
})

const video=document.createElement("video")
video.srcObject=stream
video.play()
video.muted=true

btn.style.display="none"

video.onplaying=()=>loop(video)

}

function loop(video){

ctx.drawImage(video,0,0,SIZE,SIZE)

const data = ctx.getImageData(0,0,SIZE,SIZE).data

for(const z of zones){

const i=(z.y*SIZE+z.x)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

const brightness = (r+g+b)/3

/* boost saturation */

r += (r-brightness)*1.4
g += (g-brightness)*1.4
b += (b-brightness)*1.4

/* explosion boost */

const lumBoost = brightness/255

r *= 1+lumBoost*0.6
g *= 1+lumBoost*0.6
b *= 1+lumBoost*0.6

r=Math.min(255,r)
g=Math.min(255,g)
b=Math.min(255,b)

/* difference */

const diff =
Math.abs(r-z.color[0])+
Math.abs(g-z.color[1])+
Math.abs(b-z.color[2])

/* adaptive smoothing */

const smooth =
diff>140 ? 0.75 :
diff>70  ? 0.45 :
diff>30  ? 0.25 :
0.15

z.color[0]+= (r-z.color[0])*smooth
z.color[1]+= (g-z.color[1])*smooth
z.color[2]+= (b-z.color[2])*smooth

const rr=Math.round(z.color[0])
const gg=Math.round(z.color[1])
const bb=Math.round(z.color[2])

document.getElementById(z.id).style.background=
`radial-gradient(circle,rgb(${rr},${gg},${bb}) 0%,transparent 80%)`

}

requestAnimationFrame(()=>loop(video))

}

</script>

</body>
</html>
