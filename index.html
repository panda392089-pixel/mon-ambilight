<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ambilight ULTRA</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

#container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.segment{
position:absolute;
filter:blur(80px);
opacity:0.95;
transition:background 0.08s linear;
}

.top{
top:0;
height:25px;
}

.left{
left:0;
width:25px;
}

.right{
right:0;
width:25px;
}

#start{
position:absolute;
z-index:10;
left:50%;
top:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:20px;
cursor:pointer;
border:none;
background:#111;
color:white;
border-radius:10px;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div id="container"></div>

<button id="start">Lancer Ambilight ULTRA</button>

<canvas id="capture"></canvas>

<script>

const topZones = 60
const sideZones = 30

const container = document.getElementById("container")

function createZones(){

for(let i=0;i<topZones;i++){

let div=document.createElement("div")

div.className="segment top"

div.style.width=(100/topZones)+"%"
div.style.left=(i*(100/topZones))+"%"

container.appendChild(div)

}

for(let i=0;i<sideZones;i++){

let left=document.createElement("div")
left.className="segment left"

left.style.height=(100/sideZones)+"%"
left.style.top=(i*(100/sideZones))+"%"

container.appendChild(left)

let right=document.createElement("div")
right.className="segment right"

right.style.height=(100/sideZones)+"%"
right.style.top=(i*(100/sideZones))+"%"

container.appendChild(right)

}

}

createZones()

const canvas=document.getElementById("capture")
const ctx=canvas.getContext("2d")

let smoothColors={}

function smooth(id,newColor){

if(!smoothColors[id]) smoothColors[id]=newColor

let old=smoothColors[id]

old.r+= (newColor.r-old.r)*0.35
old.g+= (newColor.g-old.g)*0.35
old.b+= (newColor.b-old.b)*0.35

return old

}

function average(data){

let r=0,g=0,b=0,c=0

for(let i=0;i<data.data.length;i+=4){

r+=data.data[i]
g+=data.data[i+1]
b+=data.data[i+2]

c++

}

return {
r:r/c,
g:g/c,
b:b/c
}

}

async function start(){

document.getElementById("start").remove()

const stream = await navigator.mediaDevices.getDisplayMedia({
video:true
})

const video=document.createElement("video")
video.srcObject=stream
await video.play()

canvas.width=video.videoWidth
canvas.height=video.videoHeight

function update(){

ctx.drawImage(video,0,0)

const topSize=canvas.width/topZones
const sideSize=canvas.height/sideZones

const tops=document.querySelectorAll(".top")

tops.forEach((node,i)=>{

const img=ctx.getImageData(i*topSize,0,topSize,30)

let col=average(img)
col=smooth("t"+i,col)

node.style.background=`rgb(${col.r},${col.g},${col.b})`

})

const lefts=document.querySelectorAll(".left")

lefts.forEach((node,i)=>{

const img=ctx.getImageData(0,i*sideSize,30,sideSize)

let col=average(img)
col=smooth("l"+i,col)

node.style.background=`rgb(${col.r},${col.g},${col.b})`

})

const rights=document.querySelectorAll(".right")

rights.forEach((node,i)=>{

const img=ctx.getImageData(canvas.width-30,i*sideSize,30,sideSize)

let col=average(img)
col=smooth("r"+i,col)

node.style.background=`rgb(${col.r},${col.g},${col.b})`

})

requestAnimationFrame(update)

}

update()

}

document.getElementById("start").onclick=start

</script>

</body>
</html>
