<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        /* Conteneur principal de l'effet */
        #ambilight-container {
            position: absolute;
            top: 10vh; /* Laisse un espace pour que la lueur dépasse */
            left: 10vw;
            width: 80vw;
            height: 80vh;
            z-index: 1;
            opacity: 0; 
            transition: opacity 1s;
        }

        /* La zone de lumière intense */
        #ambilight-glow {
            width: 100%;
            height: 100%;
            /* Ne pas mettre de fond coloré ici pour plus de réalisme */
        }

        /* Bouton d'activation OBS (Interagir) */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            font-size: 1.5em;
            background: #222;
            color: white;
            border: 2px solid #444; cursor: pointer; border-radius: 50px;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        #start-btn:hover { background: #333; }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER AMBILIGHT PRO<br>(Faire OBS > Interagir)</button>
    
    <div id="ambilight-container">
        <div id="ambilight-glow"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const container = document.getElementById('ambilight-container');
        const glow = document.getElementById('ambilight-glow');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1920, height: 1080 },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none'; 
                container.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 32; // Un peu plus de détails pour de meilleurs dégradés
                    canvas.height = 18;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // Récupération des couleurs des coins principaux (indices ajustés)
                    const cTopLeft = getAvgRGB(data, 0, 0);
                    const cTopRight = getAvgRGB(data, canvas.width - 1, 0);
                    const cBottomLeft = getAvgRGB(data, 0, canvas.height - 1);
                    const cBottomRight = getAvgRGB(data, canvas.width - 1, canvas.height - 1);

                    // --- SECRET DU RÉALISME : SUPERPOSITION D'OMBRES ---
                    // Couche 1 : Lueur intense près des bords (flou moyen)
                    // Couche 2 : Lueur large et diffuse (flou très grand)
                    // Couche 3 : Complément pour booster les couleurs
                    
                    glow.style.boxShadow = `
                        /* COUCHE INTENSE */
                        -120px -120px 200px -30px ${cTopLeft}, 
                        120px -120px 200px -30px ${cTopRight},
                        -120px 120px 200px -30px ${cBottomLeft},
                        120px 120px 200px -30px ${cBottomRight},

                        /* COUCHE DIFFUSE (ULTRA LARGE) */
                        -250px -250px 400px -100px ${cTopLeft}, 
                        250px -250px 400px -100px ${cTopRight},
                        -250px 250px 400px -100px ${cBottomLeft},
                        250px 250px 400px -100px ${cBottomRight}
                    `;

                    requestAnimationFrame(render);
                }

                function getAvgRGB(data, x, y) {
                    const index = (y * canvas.width + x) * 4;
                    // On force la luminosité si nécessaire ici (optionnel)
                    const r = data[index];
                    const g = data[index+1];
                    const b = data[index+2];
                    return `rgb(${r},${g},${b})`;
                }

            } catch (err) {
                alert("Erreur de capture : " + err);
            }
        };
    </script>
</body>
</html>
