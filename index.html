<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Gaming Pro - Ultra Soft</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Conteneur principal avec un léger flou global pour lisser les pixels */
        #ambilight-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            filter: blur(60px); /* Flou global pour fusionner les zones */
        }

        .glow-zone {
            position: absolute;
            border-radius: 50%; /* Rend les zones circulaires */
            opacity: 0.8;
            mix-blend-mode: screen;
            will-change: background, transform;
            transition: background 0.1s ease-out; /* Adoucit les transitions de couleur */
        }

        /* Positionnement stratégique pour éviter l'effet "bordure" */
        #z-top {
            top: -15%; left: 15%;
            width: 70%; height: 50%;
        }

        #z-left {
            top: 15%; left: -15%;
            width: 50%; height: 70%;
        }

        #z-right {
            top: 15%; right: -15%;
            width: 50%; height: 70%;
        }

        #z-bottom {
            bottom: -15%; left: 15%;
            width: 70%; height: 50%;
        }

        /* Interface utilisateur */
        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        button {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }

        button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        canvas { display: none; }
    </style>
</head>

<body>

    <div id="ui-layer">
        <button id="start-btn">DÉMARRER LE MODE IMMERSIF</button>
        <p style="color:#666; margin-top:15px;">Capturez votre écran de jeu pour activer l'ambiance</p>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const canvas = document.getElementById("procCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, willReadFrequently: true });

        const elements = {
            top: document.getElementById("z-top"),
            left: document.getElementById("z-left"),
            right: document.getElementById("z-right"),
            bottom: document.getElementById("z-bottom")
        };

        const zones = {
            top: { x: 1, y: 0 },
            left: { x: 0, y: 1 },
            right: { x: 2, y: 1 },
            bottom: { x: 1, y: 2 }
        };

        const SATURATION_BOOST = 1.8; // Augmenté pour plus de dynamisme

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 64, height: 36, frameRate: 60 },
                    audio: false
                });

                const video = document.createElement("video");
                video.srcObject = stream;
                video.muted = true;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                
                canvas.width = 3;
                canvas.height = 3;

                const updateGlow = () => {
                    if (video.paused || video.ended) return;

                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    for (let id in zones) {
                        const z = zones[id];
                        const i = (z.y * 3 + z.x) * 4;

                        let r = data[i], g = data[i+1], b = data[i+2];

                        // Boost de saturation amélioré
                        const gray = 0.2989 * r + 0.587 * g + 0.114 * b;
                        r = Math.max(0, Math.min(255, gray + (r - gray) * SATURATION_BOOST));
                        g = Math.max(0, Math.min(255, gray + (g - gray) * SATURATION_BOOST));
                        b = Math.max(0, Math.min(255, gray + (b - gray) * SATURATION_BOOST));

                        // Application du style avec un dégradé radial interne pour plus de douceur
                        elements[id].style.background = `radial-gradient(circle, rgba(${r},${g},${b},1) 0%, rgba(${r},${g},${b},0.3) 60%, rgba(${r},${g},${b},0) 100%)`;
                        
                        // Petit effet de pulsation subtile selon la luminosité
                        const brightness = (r + g + b) / 765;
                        elements[id].style.transform = `scale(${1 + brightness * 0.1})`;
                    }
                    video.requestVideoFrameCallback(updateGlow);
                };

                video.requestVideoFrameCallback(updateGlow);

            } catch (err) {
                console.error("Erreur :", err);
            }
        };
    </script>
</body>
</html>
