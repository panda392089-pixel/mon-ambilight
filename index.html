<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight - Liquid Motion</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        #ambilight-wrapper {
            position: absolute;
            top: -25vh; left: -25vw;
            width: 150vw; height: 150vh;
            pointer-events: none;
            transform: translateZ(0);
        }

        .glow-zone {
            position: absolute;
            width: 80vw;
            height: 80vh;
            mix-blend-mode: screen;
            filter: blur(200px); /* Nuage encore plus diffus */
            opacity: 0.9;
            transition: none !important; /* On gère la fluidité en JS, pas en CSS */
            will-change: background;
        }

        #z-top    { top: 0; left: 35vw; }
        #z-left   { left: 0; top: 35vh; }
        #z-right  { right: 0; top: 35vh; }
        #z-bottom { bottom: 0; left: 35vw; }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; background: #000; color: #fff; border: 1px solid #fff;
            cursor: pointer; z-index: 1000; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER LE FLUX LIQUIDE</button>
    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
        
        // Structure pour stocker l'état actuel des couleurs (pour le lissage)
        const zones = {
            'z-top':    { x: 1, y: 0, current: [0,0,0], target: [0,0,0] },
            'z-left':   { x: 0, y: 1, current: [0,0,0], target: [0,0,0] },
            'z-right':  { x: 2, y: 1, current: [0,0,0], target: [0,0,0] },
            'z-bottom': { x: 1, y: 2, current: [0,0,0], target: [0,0,0] }
        };

        // FACTEUR DE LISSAGE : 0.1 = très fluide/lent, 0.8 = très réactif/nerveux
        const SMOOTHING = 0.15; 

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 128, height: 72, frameRate: 60 }
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.play();
                btn.style.display = 'none';

                video.onplaying = () => {
                    canvas.width = 3; canvas.height = 3;
                    renderLoop();
                };

                function renderLoop() {
                    if (video.paused || video.ended) return;

                    // 1. Capture de la cible
                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    for (let id in zones) {
                        const z = zones[id];
                        const i = (z.y * 3 + z.x) * 4;
                        
                        // 2. Calcul de la cible (avec boost de couleur)
                        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                        z.target = [
                            data[i] + (data[i] - avg) * 0.8,
                            data[i+1] + (data[i+1] - avg) * 0.8,
                            data[i+2] + (data[i+2] - avg) * 0.8
                        ];

                        // 3. INTERPOLATION LINÉAIRE (Le secret de la fluidité)
                        // current = current + (target - current) * smoothing
                        z.current[0] += (z.target[0] - z.current[0]) * SMOOTHING;
                        z.current[1] += (z.target[1] - z.current[1]) * SMOOTHING;
                        z.current[2] += (z.target[2] - z.current[2]) * SMOOTHING;

                        // 4. Mise à jour visuelle
                        const r = Math.round(z.current[0]);
                        const g = Math.round(z.current[1]);
                        const b = Math.round(z.current[2]);
                        
                        document.getElementById(id).style.background = 
                            `radial-gradient(circle, rgb(${r},${g},${b}) 0%, transparent 85%)`;
                    }
                    requestAnimationFrame(renderLoop);
                }
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
