<!DOCTYPE html>
<html>
<body style="background:transparent; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
    <button id="btn" style="padding:20px; cursor:pointer;">LANCER L'AMBILIGHT</button>
    <div id="amb" style="width:1087px; height:669px; filter:blur(100px); border-radius:50px; position:absolute; z-index:-1;"></div>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('btn');
        const amb = document.getElementById('amb');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', {willReadFrequently: true});

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({video:true});
                btn.style.display = 'none';
                const v = document.createElement('video');
                v.srcObject = stream;
                v.play();
                v.onloadedmetadata = () => {
                    canvas.width = 16; canvas.height = 16;
                    const update = () => {
                        ctx.drawImage(v, 0, 0, 16, 16);
                        const d = ctx.getImageData(0,0,16,16).data;
                        let r=0, g=0, b=0;
                        for(let i=0; i<d.length; i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
                        let count = d.length/4;
                        let color = `rgb(${~~(r/count)},${~~(g/count)},${~~(b/count)})`;
                        amb.style.background = color;
                        amb.style.boxShadow = `0 0 150px ${color}`;
                        requestAnimationFrame(update);
                    };
                    update();
                };
            } catch (e) {
                alert("Erreur de permission : " + e);
            }
        };
    </script>
</body>
</html>
