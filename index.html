<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ambilight Ultra Reactive</title>

<style>
body { margin:0; overflow:hidden; background:transparent; }

#ambilight-wrapper{
position:absolute;
top:-25vh; left:-25vw;
width:150vw; height:150vh;
pointer-events:none;
}

.glow-zone{
position:absolute;
width:80vw;
height:80vh;
mix-blend-mode:screen;
filter:blur(180px);
opacity:0.95;
will-change:background;
}

#z-top{top:0; left:35vw;}
#z-left{left:0; top:35vh;}
#z-right{right:0; top:35vh;}
#z-bottom{bottom:0; left:35vw;}

#start-btn{
position:fixed;
top:50%; left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
background:#000;
color:#fff;
border:1px solid #fff;
cursor:pointer;
z-index:1000;
}
</style>
</head>

<body>

<button id="start-btn">ACTIVER AMBILIGHT</button>

<div id="ambilight-wrapper">
<div id="z-top" class="glow-zone"></div>
<div id="z-left" class="glow-zone"></div>
<div id="z-right" class="glow-zone"></div>
<div id="z-bottom" class="glow-zone"></div>
</div>

<canvas id="procCanvas" style="display:none;"></canvas>

<script>

const btn = document.getElementById("start-btn")
const canvas = document.getElementById("procCanvas")
const ctx = canvas.getContext("2d",{alpha:false,desynchronized:true})

const SIZE = 8
canvas.width = SIZE
canvas.height = SIZE

const zones = {
'z-top':    {x:4,y:0,current:[0,0,0]},
'z-left':   {x:0,y:4,current:[0,0,0]},
'z-right':  {x:7,y:4,current:[0,0,0]},
'z-bottom': {x:4,y:7,current:[0,0,0]}
}

btn.onclick = async ()=>{

const stream = await navigator.mediaDevices.getDisplayMedia({
video:{
width:128,
height:72,
frameRate:60
}
})

const video=document.createElement("video")
video.srcObject=stream
video.play()
video.muted=true

btn.style.display="none"

video.onplaying=()=>{

function loop(){

ctx.drawImage(video,0,0,SIZE,SIZE)

const data=ctx.getImageData(0,0,SIZE,SIZE).data

for(const id in zones){

const z=zones[id]

const i=(z.y*SIZE+z.x)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

const avg=(r+g+b)/3

// BOOST saturation
r += (r-avg)*1.2
g += (g-avg)*1.2
b += (b-avg)*1.2

// clamp
r=Math.max(0,Math.min(255,r))
g=Math.max(0,Math.min(255,g))
b=Math.max(0,Math.min(255,b))

// différence avec la couleur actuelle
const diff =
Math.abs(r-z.current[0])+
Math.abs(g-z.current[1])+
Math.abs(b-z.current[2])

// SMOOTHING ADAPTATIF
const smoothing =
diff>120 ? 0.65 :
diff>60  ? 0.45 :
diff>20  ? 0.30 :
0.18

z.current[0]+= (r-z.current[0])*smoothing
z.current[1]+= (g-z.current[1])*smoothing
z.current[2]+= (b-z.current[2])*smoothing

const rr=Math.round(z.current[0])
const gg=Math.round(z.current[1])
const bb=Math.round(z.current[2])

document.getElementById(id).style.background =
`radial-gradient(circle,rgb(${rr},${gg},${bb}) 0%,transparent 80%)`

}

requestAnimationFrame(loop)
}

loop()

}

}

</script>
</body>
</html>
