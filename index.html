<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Ultra Soft</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        #ambilight-container {
            position: absolute;
            top: 15vh;
            left: 15vw;
            width: 70vw;
            height: 70vh;
            z-index: 1;
            opacity: 0; 
            transition: opacity 1.5s ease-in-out;
            /* L'astuce : un arrondi total pour fusionner les ombres au centre */
            border-radius: 50%; 
        }

        #ambilight-glow {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Filtre de lissage supplémentaire */
            filter: blur(50px);
        }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px 40px;
            font-size: 1.2em;
            background: #111;
            color: #fff;
            border: 1px solid #333; cursor: pointer; border-radius: 8px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER L'EFFET IMMERSIF<br><small>(Clic droit > Interagir dans OBS)</small></button>
    
    <div id="ambilight-container">
        <div id="ambilight-glow"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const container = document.getElementById('ambilight-container');
        const glow = document.getElementById('ambilight-glow');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1280, height: 720 }, // Résolution réduite pour fluidité
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none'; 
                container.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 16; // Basse résolution = mélange de couleurs naturel
                    canvas.height = 9;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // On échantillonne des zones plutôt que des pixels uniques
                    const cTopLeft = getAvgRGB(data, 2, 2);
                    const cTopRight = getAvgRGB(data, 13, 2);
                    const cBottomLeft = getAvgRGB(data, 2, 7);
                    const cBottomRight = getAvgRGB(data, 13, 7);

                    // Calcul de la couleur moyenne centrale pour "lier" le tout
                    const cCenter = getAvgRGB(data, 8, 4);

                    glow.style.boxShadow = `
                        /* COUCHE DE COEUR (Lien central) */
                        0 0 300px 100px ${cCenter},
                        
                        /* COUCHE ATMOSPHÉRIQUE (Très diffuse) */
                        -20vw -15vh 450px 50px ${cTopLeft}, 
                        20vw -15vh 450px 50px ${cTopRight},
                        -20vw 15vh 450px 50px ${cBottomLeft},
                        20vw 15vh 450px 50px ${cBottomRight},

                        /* COUCHE DE BORDURE (Plus colorée) */
                        -10vw -10vh 150px 0px ${cTopLeft}, 
                        10vw -10vh 150px 0px ${cTopRight},
                        -10vw 10vh 150px 0px ${cBottomLeft},
                        10vw 10vh 150px 0px ${cBottomRight}
                    `;

                    requestAnimationFrame(render);
                }

                function getAvgRGB(data, x, y) {
                    const i = (y * canvas.width + x) * 4;
                    // Boost de saturation léger (1.2) pour compenser le flou
                    return `rgba(${data[i]}, ${data[i+1]}, ${data[i+2]}, 0.8)`;
                }

            } catch (err) {
                console.error(err);
            }
        };
    </script>
</body>
</html>
