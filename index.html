<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ambilight Web</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial;
}

#start{
position:absolute;
z-index:10;
top:20px;
left:20px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#00ffff;
cursor:pointer;
}

canvas{
display:none;
}

.edge{
position:fixed;
pointer-events:none;
filter:blur(80px);
opacity:0.9;
}

#top{
top:0;
left:0;
width:100%;
height:120px;
}

#bottom{
bottom:0;
left:0;
width:100%;
height:120px;
}

#left{
top:0;
left:0;
width:120px;
height:100%;
}

#right{
top:0;
right:0;
width:120px;
height:100%;
}

</style>
</head>

<body>

<button id="start">Activer Ambilight</button>

<video id="screen" autoplay></video>
<canvas id="canvas"></canvas>

<div id="top" class="edge"></div>
<div id="bottom" class="edge"></div>
<div id="left" class="edge"></div>
<div id="right" class="edge"></div>

<script>

const video = document.getElementById("screen")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const edges={
top:document.getElementById("top"),
bottom:document.getElementById("bottom"),
left:document.getElementById("left"),
right:document.getElementById("right")
}

document.getElementById("start").onclick=async ()=>{

const stream = await navigator.mediaDevices.getDisplayMedia({
video:true
})

video.srcObject=stream

video.onloadedmetadata=()=>{
canvas.width=video.videoWidth
canvas.height=video.videoHeight
requestAnimationFrame(update)
}

}

function avgColor(x,y,w,h){

const data = ctx.getImageData(x,y,w,h).data

let r=0,g=0,b=0,count=0

for(let i=0;i<data.length;i+=4){
r+=data[i]
g+=data[i+1]
b+=data[i+2]
count++
}

return `rgb(${r/count},${g/count},${b/count})`
}

function update(){

ctx.drawImage(video,0,0,canvas.width,canvas.height)

const edgeSize=120

const topColor=avgColor(0,0,canvas.width,edgeSize)
const bottomColor=avgColor(0,canvas.height-edgeSize,canvas.width,edgeSize)
const leftColor=avgColor(0,0,edgeSize,canvas.height)
const rightColor=avgColor(canvas.width-edgeSize,0,edgeSize,canvas.height)

edges.top.style.background=topColor
edges.bottom.style.background=bottomColor
edges.left.style.background=leftColor
edges.right.style.background=rightColor

requestAnimationFrame(update)

}

</script>

</body>
</html>
