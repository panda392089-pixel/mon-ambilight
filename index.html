<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Organique</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Le canvas qui affichera la lueur */
        #ambilight-screen {
            position: absolute;
            width: 130vw; /* Beaucoup plus large que l'écran pour une diffusion totale */
            height: 130vh; /* Beaucoup plus haut */
            z-index: 1;
            
            /* --- SECRET DE LA DIFFUSION ORGANIQUE --- */
            /* Le flou floute les pixels étirés, fusionnant les couleurs */
            filter: blur(80px); /* Ajuste la douceur ici (50px à 120px) */
            
            opacity: 0;
            transition: opacity 1.5s;
            object-fit: fill; /* Étire l'image pour remplir tout le canvas */
        }

        /* Bouton d'activation OBS (Interagir) */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px 40px;
            font-size: 1.3em;
            background: #111;
            color: #ccc;
            border: 1px solid #333; cursor: pointer; border-radius: 8px;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }
        #start-btn:hover { background: #222; color: white; }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER AMBILIGHT</button>
    
    <canvas id="ambilight-screen"></canvas>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const ambilightCanvas = document.getElementById('ambilight-screen');
        const procCanvas = document.getElementById('procCanvas');
        
        const ambilightCtx = ambilightCanvas.getContext('2d');
        const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

        // Résolution d'analyse (basse pour la performance et une fusion douce)
        const ANALYSIS_WIDTH = 32;
        const ANALYSIS_HEIGHT = 18;

        btn.onclick = async () => {
            try {
                // Demander la source vidéo (Fenêtre de jeu ou Écran)
                // On capture en résolution modérée pour économiser des ressources
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none'; 

                video.onplaying = () => {
                    // Initialiser les tailles des canvas
                    procCanvas.width = ANALYSIS_WIDTH;
                    procCanvas.height = ANALYSIS_HEIGHT;
                    
                    // Le canvas visible doit correspondre à la taille de la source OBS
                    ambilightCanvas.width = window.innerWidth;
                    ambilightCanvas.height = window.innerHeight;
                    
                    ambilightCanvas.style.opacity = '1';
                    
                    render();
                };

                function render() {
                    if (video.paused || video.ended) return;

                    // 1. Dessiner le flux vidéo complet sur le petit canvas d'analyse
                    procCtx.drawImage(video, 0, 0, ANALYSIS_WIDTH, ANALYSIS_HEIGHT);
                    
                    // 2. Dessiner le petit canvas d'analyse sur le grand canvas visible
                    // L'étirement (fill) et le flou CSS vont créer l'effet organique
                    ambilightCtx.clearRect(0, 0, ambilightCanvas.width, ambilightCanvas.height);
                    ambilightCtx.drawImage(procCanvas, 0, 0, ambilightCanvas.width, ambilightCanvas.height);

                    requestAnimationFrame(render);
                }

                // Gérer le redimensionnement de la source OBS
                window.onresize = () => {
                    ambilightCanvas.width = window.innerWidth;
                    ambilightCanvas.height = window.innerHeight;
                };

            } catch (err) {
                console.error("Erreur de capture : " + err);
                btn.textContent = "Erreur. Réessaye.";
                btn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
