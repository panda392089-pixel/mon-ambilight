<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Full Surface Immersion</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #ambilight-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            /* Le secret : un flou colossal et un scale pour éviter les bords noirs du flou */
            filter: blur(250px) saturate(1.5);
            transform: scale(1.2); 
        }

        .glow-zone {
            position: absolute;
            will-change: background;
            opacity: 0.8;
            mix-blend-mode: lighten;
        }

        /* Les zones sont maintenant géantes pour couvrir tout l'espace */
        #z-top { top: -20%; left: 0; width: 100%; height: 60%; }
        #z-bottom { bottom: -20%; left: 0; width: 100%; height: 60%; }
        #z-left { top: 0; left: -20%; width: 60%; height: 100%; }
        #z-right { top: 0; right: -20%; width: 60%; height: 100%; }
        
        /* Zone centrale de fusion pour l'homogénéité */
        #z-center { 
            top: 25%; left: 25%; width: 50%; height: 50%; 
            border-radius: 50%; 
            filter: blur(100px);
        }

        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            font-family: sans-serif;
        }

        button {
            padding: 20px 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            letter-spacing: 2px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">LANCER L'IMMERSION TOTALE</button>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
        <div id="z-center" class="glow-zone"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const canvas = document.getElementById("procCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        
        const elements = {
            top: document.getElementById("z-top"),
            left: document.getElementById("z-left"),
            right: document.getElementById("z-right"),
            bottom: document.getElementById("z-bottom"),
            center: document.getElementById("z-center")
        };

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 32, height: 18, frameRate: 60 }
                });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                canvas.width = 3;
                canvas.height = 3;

                const render = () => {
                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    const getRGB = (x, y) => {
                        const i = (y * 3 + x) * 4;
                        return `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
                    };

                    elements.top.style.backgroundColor = getRGB(1, 0);
                    elements.left.style.backgroundColor = getRGB(0, 1);
                    elements.right.style.backgroundColor = getRGB(2, 1);
                    elements.bottom.style.backgroundColor = getRGB(1, 2);
                    // Le centre est une moyenne des bords pour lier le tout
                    elements.center.style.backgroundColor = getRGB(1, 1);

                    video.requestVideoFrameCallback(render);
                };
                video.requestVideoFrameCallback(render);
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
