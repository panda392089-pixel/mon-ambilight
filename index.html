<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Bordures Fluides</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        #ambilight-container {
            position: absolute;
            top: 15vh;
            left: 15vw;
            width: 70vw;
            height: 70vh;
            z-index: 1;
            opacity: 0; 
            transition: opacity 1.5s;
            /* Rayon modéré pour garder une structure de diffusion sur les bords */
            border-radius: 40px; 
        }

        #ambilight-glow {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            filter: blur(60px); /* Flou augmenté pour fusionner les segments */
        }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: #111;
            color: white;
            border: 2px solid #444; cursor: pointer; border-radius: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER DIFFUSION LÉGÈRE</button>
    
    <div id="ambilight-container">
        <div id="ambilight-glow"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const container = document.getElementById('ambilight-container');
        const glow = document.getElementById('ambilight-glow');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1280, height: 720 },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none'; 
                container.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 20; // Un peu plus de points pour la précision latérale
                    canvas.height = 12;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    // --- ÉCHANTILLONNAGE DES MILIEUX ---
                    const cTop    = getAvgRGB(data, 10, 1);  // Haut Milieu
                    const cLeft   = getAvgRGB(data, 1, 6);   // Gauche Milieu
                    const cRight  = getAvgRGB(data, 18, 6);  // Droite Milieu
                    const cBottom = getAvgRGB(data, 10, 10); // Bas Milieu (pour l'équilibre)

                    glow.style.boxShadow = `
                        /* LUEUR HAUT (étirée horizontalement) */
                        0px -15vh 350px 80px ${cTop},
                        
                        /* LUEUR GAUCHE (étirée verticalement) */
                        -25vw 0px 350px 60px ${cLeft},
                        
                        /* LUEUR DROITE (étirée verticalement) */
                        25vw 0px 350px 60px ${cRight},
                        
                        /* LUEUR BAS (plus subtile pour ne pas polluer le sol) */
                        0px 10vh 250px 40px ${cBottom}
                    `;

                    requestAnimationFrame(render);
                }

                function getAvgRGB(data, x, y) {
                    const i = (y * canvas.width + x) * 4;
                    // On garde une opacité forte pour que le blur diffuse bien
                    return `rgba(${data[i]}, ${data[i+1]}, ${data[i+2]}, 0.9)`;
                }

            } catch (err) {
                console.error(err);
            }
        };
    </script>
</body>
</html>
