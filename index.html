<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Rectangulaire - Ultra Soft & Fast</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        #ambilight-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        /* Zones de projection rectangulaires */
        .glow-zone {
            position: absolute;
            filter: blur(60px); /* Lissage des bords du rectangle */
            mix-blend-mode: screen;
            /* Transition courte pour la réactivité, mais assez longue pour la douceur */
            transition: background 0.15s linear; 
        }

        #glow-top {
            top: 0; left: 5vw;
            width: 90vw; height: 25vh;
        }

        #glow-left {
            top: 5vh; left: 0;
            width: 25vw; height: 90vh;
        }

        #glow-right {
            top: 5vh; right: 0;
            width: 25vw; height: 90vh;
        }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 30px;
            background: #111;
            color: #55acee;
            border: 2px solid #55acee;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER AMBILIGHT RECTANGULAIRE</button>
    
    <div id="ambilight-wrapper">
        <div id="glow-top" class="glow-zone"></div>
        <div id="glow-left" class="glow-zone"></div>
        <div id="glow-right" class="glow-zone"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const wrapper = document.getElementById('ambilight-wrapper');
        const zones = {
            top: document.getElementById('glow-top'),
            left: document.getElementById('glow-left'),
            right: document.getElementById('glow-right')
        };
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { alpha: false, willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 480, height: 270, frameRate: 60 }, // Haute fréquence, basse res
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none';
                wrapper.style.opacity = '1';

                video.onplaying = () => {
                    // Analyse sur une grille 8x8 pour une réactivité maximale
                    canvas.width = 8; 
                    canvas.height = 8;
                    render();
                };

                function render() {
                    if (video.paused || video.ended) return;

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                    // Extraction rapide des couleurs moyennes par bordure
                    const cTop = getAvg(data, [[2,0],[3,0],[4,0],[5,0]]);
                    const cLeft = getAvg(data, [[0,2],[0,3],[0,4],[0,5]]);
                    const cRight = getAvg(data, [[7,2],[7,3],[7,4],[7,5]]);

                    // Rendu rectangulaire via linear-gradients
                    zones.top.style.background = `linear-gradient(to top, transparent, ${cTop})`;
                    zones.left.style.background = `linear-gradient(to left, transparent, ${cLeft})`;
                    zones.right.style.background = `linear-gradient(to right, transparent, ${cRight})`;

                    requestAnimationFrame(render);
                }

                function getAvg(data, pixels) {
                    let r = 0, g = 0, b = 0;
                    pixels.forEach(([x, y]) => {
                        const i = (y * 8 + x) * 4;
                        r += data[i];
                        g += data[i+1];
                        b += data[i+2];
                    });
                    const l = pixels.length;
                    // On booste un peu la saturation pour l'effet visuel (x1.1)
                    return `rgba(${Math.min(255, (r/l)*1.1)}, ${Math.min(255, (g/l)*1.1)}, ${Math.min(255, (b/l)*1.1)}, 0.8)`;
                }

            } catch (err) {
                console.error("Erreur:", err);
            }
        };
    </script>
</body>
</html>
