<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight OBS Fix</title>
    <style>
        body {
            margin: 0;
            background-color: #000; /* Fond noir pur pour OBS */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #wrapper {
            position: relative;
            width: 85%;
            aspect-ratio: 16/9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* La vidéo doit être visible pour qu'OBS la capture */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 10; 
            border-radius: 4px;
        }

        .glow-zone {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.8;
            mix-blend-mode: screen;
            z-index: 1;
            will-change: background-color;
        }

        /* Zones ajustées pour OBS */
        #top    { width: 80%; height: 60%; top: -30%; left: 10%; }
        #left   { width: 50%; height: 80%; top: 10%; left: -25%; }
        #right  { width: 50%; height: 80%; top: 10%; right: -25%; }

        #startBtn {
            position: absolute;
            z-index: 100;
            padding: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">CLIQUEZ ICI PUIS CHOISISSEZ LA SOURCE</button>

    <div id="wrapper">
        <div id="top" class="glow-zone"></div>
        <div id="left" class="glow-zone"></div>
        <div id="right" class="glow-zone"></div>
        <video id="v" autoplay muted playsinline></video>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const video = document.getElementById('v');
        const zones = {
            'top':   { x: 1, y: 0 },
            'left':  { x: 0, y: 1 },
            'right': { x: 2, y: 1 }
        };

        const canvas = document.createElement('canvas');
        canvas.width = 3;
        canvas.height = 3;
        const ctx = canvas.getContext('2d', { alpha: false });

        btn.onclick = async () => {
            try {
                // Pour OBS, on demande la capture d'écran/fenêtre
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "never" },
                    audio: false
                });
                
                video.srcObject = stream;
                btn.style.display = 'none';

                function render() {
                    if (!video.paused && !video.ended) {
                        ctx.drawImage(video, 0, 0, 3, 3);
                        const data = ctx.getImageData(0, 0, 3, 3).data;

                        for (let id in zones) {
                            const i = (zones[id].y * 3 + zones[id].x) * 4;
                            document.getElementById(id).style.backgroundColor = 
                                `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
                        }
                    }
                    requestAnimationFrame(render);
                }
                render();
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
