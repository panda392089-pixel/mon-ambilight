<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Balanced Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        #ambilight-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .glow-zone {
            position: absolute;
            filter: blur(70px); /* Flou légèrement augmenté pour plus de douceur */
            mix-blend-mode: screen;
            transition: background 0.12s ease-out; /* Plus réactif sur les changements de couleur */
        }

        /* AJUSTEMENT HAUT : Plus haut et dégradé plus long */
        #glow-top {
            top: -5vh; /* On remonte un peu pour libérer de l'espace */
            left: 5vw;
            width: 90vw; 
            height: 40vh; /* Augmenté de 25vh à 40vh pour une projection équitable */
        }

        #glow-left {
            top: 5vh; left: -2vw;
            width: 30vw; height: 90vh;
        }

        #glow-right {
            top: 5vh; right: -2vw;
            width: 30vw; height: 90vh;
        }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 35px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            cursor: pointer;
            border-radius: 5px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER L'EFFET (ÉQUILIBRÉ)</button>
    
    <div id="ambilight-wrapper">
        <div id="glow-top" class="glow-zone"></div>
        <div id="glow-left" class="glow-zone"></div>
        <div id="glow-right" class="glow-zone"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const wrapper = document.getElementById('ambilight-wrapper');
        const zones = {
            top: document.getElementById('glow-top'),
            left: document.getElementById('glow-left'),
            right: document.getElementById('glow-right')
        };
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { alpha: false, willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 480, height: 270, frameRate: 60 },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none';
                wrapper.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 10; 
                    canvas.height = 10;
                    render();
                };

                function render() {
                    if (video.paused || video.ended) return;

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                    // On cible les pixels du bord haut de manière plus large pour plus de puissance
                    const cTop = getAvg(data, [[3,0],[4,0],[5,0],[6,0],[4,1],[5,1]]);
                    const cLeft = getAvg(data, [[0,3],[0,4],[0,5],[0,6]]);
                    const cRight = getAvg(data, [[9,3],[9,4],[9,5],[9,6]]);

                    // Modification du gradient haut pour qu'il "remonte" plus fort
                    zones.top.style.background = `linear-gradient(to bottom, ${cTop}, transparent 90%)`;
                    zones.left.style.background = `linear-gradient(to right, ${cLeft}, transparent 85%)`;
                    zones.right.style.background = `linear-gradient(to left, ${cRight}, transparent 85%)`;

                    requestAnimationFrame(render);
                }

                function getAvg(data, pixels) {
                    let r = 0, g = 0, b = 0;
                    pixels.forEach(([x, y]) => {
                        const i = (y * 10 + x) * 4;
                        r += data[i];
                        g += data[i+1];
                        b += data[i+2];
                    });
                    const l = pixels.length;
                    // Boost de luminosité sur le calcul pour compenser l'atténuation du flou
                    return `rgba(${Math.min(255, (r/l)*1.2)}, ${Math.min(255, (g/l)*1.2)}, ${Math.min(255, (b/l)*1.2)}, 0.9)`;
                }

            } catch (err) {
                console.error(err);
            }
        };
    </script>
</body>
</html>
