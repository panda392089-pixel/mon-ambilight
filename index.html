<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Symmetric Diffusion</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #ambilight-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            /* On augmente encore le flou et on booste la couleur */
            filter: blur(280px) saturate(1.8) contrast(1.2);
            transform: scale(1.4); /* Zoom plus fort pour noyer les bords */
        }

        .glow-zone {
            position: absolute;
            will-change: background;
            opacity: 1;
            mix-blend-mode: screen;
            border-radius: 50%; /* Forme ronde pour toutes les zones */
        }

        /* Distribution égale : les zones font 120% de la dimension pour déborder largement */
        #z-top { 
            top: -40%; left: -10%; 
            width: 120%; height: 80%; 
        }
        
        #z-left { 
            top: -10%; left: -40%; 
            width: 80%; height: 120%; 
        }
        
        #z-right { 
            top: -10%; right: -40%; 
            width: 80%; height: 120%; 
        }
        
        #z-bottom { 
            bottom: -40%; left: -10%; 
            width: 120%; height: 80%; 
        }

        /* Interface */
        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        button {
            padding: 20px 50px;
            background: none;
            border: 1px solid rgba(255,255,255,0.8);
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            color: black;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">ACTIVER LA DIFFUSION MAXIMALE</button>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const canvas = document.getElementById("procCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        
        const elements = {
            top: document.getElementById("z-top"),
            left: document.getElementById("z-left"),
            right: document.getElementById("z-right"),
            bottom: document.getElementById("z-bottom")
        };

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 32, height: 18, frameRate: 60 }
                });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                canvas.width = 3;
                canvas.height = 3;

                const render = () => {
                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    const setStyle = (el, x, y) => {
                        const i = (y * 3 + x) * 4;
                        el.style.backgroundColor = `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
                    };

                    setStyle(elements.top, 1, 0);
                    setStyle(elements.left, 0, 1);
                    setStyle(elements.right, 2, 1);
                    setStyle(elements.bottom, 1, 2);

                    video.requestVideoFrameCallback(render);
                };
                video.requestVideoFrameCallback(render);
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
