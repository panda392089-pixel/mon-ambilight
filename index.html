<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight - Liquid Motion</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        #ambilight-wrapper {
            position: absolute;
            top: -25vh; left: -25vw;
            width: 150vw; height: 150vh;
            pointer-events: none;
            transform: translateZ(0);
        }

        .glow-zone {
            position: absolute;
            width: 80vw;
            height: 80vh;
            mix-blend-mode: screen;
            filter: blur(200px); /* Nuage encore plus diffus */
            opacity: 0.9;
            transition: none !important; /* On gère la fluidité en JS, pas en CSS */
            will-change: background;
        }

        #z-top    { top: 0; left: 35vw; }
        #z-left   { left: 0; top: 35vh; }
        #z-right  { right: 0; top: 35vh; }
        #z-bottom { bottom: 0; left: 35vw; }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; background: #000; color: #fff; border: 1px solid #fff;
            cursor: pointer; z-index: 1000; font-family: sans-serif;
        }
<style>
    /* ... (ton reste de CSS) ... */
    .glow-zone {
        /* On utilise background-color au lieu de radial-gradient pour plus de performance */
        background-color: transparent; 
        filter: blur(150px); /* Le flou crée l'effet de diffusion sans le coût du gradient */
        will-change: background-color;
        transition: none !important;
    }
</style>

<script>
    // ... (début du script identique) ...

    // 1. PASSE LE SMOOTHING À 1 (Désactive le délai)
    const SMOOTHING = 1; 

    btn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { 
                    width: 128, 
                    height: 72, 
                    frameRate: 60 // Assure-toi que c'est bien à 60
                },
                // Optionnel : réduit la latence système
                selfBrowserSurface: "exclude", 
                surfaceSwitching: "include"
            });

            // ... (création vidéo identique) ...

            function renderLoop() {
                if (video.paused || video.ended) return;

                // Capture ultra-rapide
                ctx.drawImage(video, 0, 0, 3, 3);
                const data = ctx.getImageData(0, 0, 3, 3).data;

                for (let id in zones) {
                    const z = zones[id];
                    const i = (z.y * 3 + z.x) * 4;
                    
                    // On prend la couleur brute directement
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];

                    // Mise à jour directe de la couleur de fond (plus rapide que le gradient)
                    // Le flou CSS (filter: blur) s'occupe de l'aspect esthétique
                    document.getElementById(id).style.backgroundColor = `rgb(${r},${g},${b})`;
                }
                
                // Utilisation de requestAnimationFrame pour synchroniser avec l'écran
                requestAnimationFrame(renderLoop);
            }
        } catch (err) { console.error(err); }
    };
</script>
</body>
</html>
