<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Cloud - Ultra Reactive</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        #ambilight-wrapper {
            position: absolute;
            top: -15vh; left: -15vw;
            width: 130vw; height: 130vh;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
        }

        .glow-zone {
            position: absolute;
            width: 60vw;
            height: 60vh;
            mix-blend-mode: screen;
            filter: blur(150px); /* Diffusion massive */
            opacity: 0.85;
            /* Suppression des transitions CSS pour éliminer la latence visuelle */
            transition: none; 
        }

        /* Positionnement en "nuage" autour de l'écran */
        #z-top    { top: 0; left: 35vw; }
        #z-bottom { bottom: 0; left: 35vw; }
        #z-left   { left: 0; top: 35vh; }
        #z-right  { right: 0; top: 35vh; }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: #000; color: #fff; border: 1px solid #fff;
            cursor: pointer; z-index: 1000; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <button id="start-btn">LANCER LE FLUX RÉACTIF</button>
    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true }); // Latence réduite
        
        const zones = {
            'z-top':    { x: 2, y: 0 },
            'z-left':   { x: 0, y: 2 },
            'z-right':  { x: 3, y: 2 },
            'z-bottom': { x: 2, y: 3 }
        };

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        width: 128, // Résolution minimale pour vitesse maximale
                        height: 72,
                        frameRate: 60 
                    }
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                btn.style.display = 'none';

                video.onplaying = () => {
                    canvas.width = 4;
                    canvas.height = 4;
                    render();
                };

                function render() {
                    if (video.paused || video.ended) return;

                    // Capture ultra-rapide
                    ctx.drawImage(video, 0, 0, 4, 4);
                    const data = ctx.getImageData(0, 0, 4, 4).data;

                    for (let id in zones) {
                        const pos = zones[id];
                        const i = (pos.y * 4 + pos.x) * 4;
                        
                        // Extraction et Boost de Saturation
                        let r = data[i], g = data[i+1], b = data[i+2];
                        
                        // Algorithme de vibrance (accentue sans durcir)
                        const max = Math.max(r, g, b);
                        const avg = (r + g + b) / 3;
                        const saturation = 1.5; // Augmentez pour des couleurs plus riches
                        
                        r = Math.floor(r + (r - avg) * saturation);
                        g = Math.floor(g + (g - avg) * saturation);
                        b = Math.floor(b + (b - avg) * saturation);

                        // Application immédiate
                        const color = `rgb(${r},${g},${b})`;
                        document.getElementById(id).style.background = 
                            `radial-gradient(circle, ${color} 0%, transparent 80%)`;
                    }
                    
                    // Utilisation de requestAnimationFrame pour synchroniser avec le rafraîchissement écran
                    requestAnimationFrame(render);
                }
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
