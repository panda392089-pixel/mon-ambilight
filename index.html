<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Correction Latérale</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        #ambilight-root {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
        }

        .light-source {
            position: absolute;
            width: 60vw; height: 60vh;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.6;
            mix-blend-mode: screen;
            transition: background 0.2s ease;
        }

        /* Placement forcé aux trois bords */
        #top-light   { top: -25vh; left: 20vw; }
        #left-light  { top: 20vh;  left: -25vw; }
        #right-light { top: 20vh;  right: -25vw; }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: #222; color: #fff; cursor: pointer; z-index: 1000;
        }

        #monitor {
            position: fixed; bottom: 10px; right: 10px; 
            width: 160px; height: 90px; border: 2px solid white; z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="start-btn">LANCER LE SCANNER TOTAL</button>
    <canvas id="monitor"></canvas>

    <div id="ambilight-root">
        <div id="top-light" class="light-source"></div>
        <div id="left-light" class="light-source"></div>
        <div id="right-light" class="light-source"></div>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const canvas = document.getElementById('monitor');
        const ctx = canvas.getContext('2d', { alpha: false });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "never" }, 
                    audio: false 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                btn.style.display = 'none';

                video.onplaying = () => {
                    // On force une résolution de lecture pour le script
                    render();
                };

                function render() {
                    // ÉTAPE CRUCIALE : On dessine la vidéo en ignorant les 10% des bords 
                    // pour éviter de capturer des bandes noires ou des cadres de fenêtre
                    ctx.drawImage(video, 
                        video.videoWidth * 0.1, video.videoHeight * 0.1, // Début du crop (10%)
                        video.videoWidth * 0.8, video.videoHeight * 0.8, // Taille du crop (80%)
                        0, 0, canvas.width, canvas.height // Redimensionnement sur le canvas
                    );

                    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    const w = canvas.width;
                    const h = canvas.height;

                    // Analyse par zones larges (Moyenne R,G,B)
                    const cTop   = getAvg(pixels, w, 0, w, 0, Math.floor(h/3));
                    const cLeft  = getAvg(pixels, w, 0, Math.floor(w/3), 0, h);
                    const cRight = getAvg(pixels, w, Math.floor(w*0.7), w, 0, h);

                    document.getElementById('top-light').style.background = cTop;
                    document.getElementById('left-light').style.background = cLeft;
                    document.getElementById('right-light').style.background = cRight;

                    requestAnimationFrame(render);
                }

                function getAvg(p, w, xS, xE, yS, yE) {
                    let r = 0, g = 0, b = 0, c = 0;
                    for (let y = yS; y < yE; y++) {
                        for (let x = xS; x < xE; x++) {
                            let i = (y * w + x) * 4;
                            r += p[i]; g += p[i+1]; b += p[i+2]; c++;
                        }
                    }
                    return `rgb(${Math.round(r/c)},${Math.round(g/c)},${Math.round(b/c)})`;
                }
            } catch (e) { alert("Erreur : " + e); }
        };
    </script>
</body>
</html>
