<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight Pro - Ultra Soft Edge</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        
        #ambilight-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* Les zones de projection */
        .glow-zone {
            position: absolute;
            filter: blur(80px); /* Flou massif pour la douceur */
            mix-blend-mode: screen; /* Fusionne mieux avec les fonds sombres */
            pointer-events: none;
        }

        #glow-top {
            top: -10vh; left: 10vw; width: 80vw; height: 30vh;
            border-radius: 50% 50% 0 0;
        }

        #glow-left {
            top: 10vh; left: -10vw; width: 30vw; height: 80vh;
            border-radius: 50% 0 0 50%;
        }

        #glow-right {
            top: 10vh; right: -10vw; width: 30vw; height: 80vh;
            border-radius: 0 50% 50% 0;
        }

        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 30px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #444;
            cursor: pointer;
            border-radius: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER L'EFFET DOUX (HAUT/CÔTÉS)</button>
    
    <div id="ambilight-wrapper">
        <div id="glow-top" class="glow-zone"></div>
        <div id="glow-left" class="glow-zone"></div>
        <div id="glow-right" class="glow-zone"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const wrapper = document.getElementById('ambilight-wrapper');
        const zones = {
            top: document.getElementById('glow-top'),
            left: document.getElementById('glow-left'),
            right: document.getElementById('glow-right')
        };
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 640, height: 360 }, // Résolution basse = meilleure performance
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                btn.style.display = 'none';
                wrapper.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 10; 
                    canvas.height = 10;
                    render();
                };

                function render() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                    // Analyse des zones spécifiques
                    const topColor = getAreaColor(data, 0, 0, 10, 3);    // Bande haute
                    const leftColor = getAreaColor(data, 0, 0, 3, 10);   // Bande gauche
                    const rightColor = getAreaColor(data, 7, 0, 3, 10);  // Bande droite

                    // Application des couleurs avec un dégradé interne pour la douceur
                    zones.top.style.background = `radial-gradient(ellipse at bottom, ${topColor}, transparent 80%)`;
                    zones.left.style.background = `radial-gradient(ellipse at right, ${leftColor}, transparent 80%)`;
                    zones.right.style.background = `radial-gradient(ellipse at left, ${rightColor}, transparent 80%)`;

                    requestAnimationFrame(render);
                }

                function getAreaColor(data, xStart, yStart, width, height) {
                    let r = 0, g = 0, b = 0, count = 0;
                    
                    for (let y = yStart; y < yStart + height; y++) {
                        for (let x = xStart; x < xStart + width; x++) {
                            const i = (y * 10 + x) * 4;
                            r += data[i];
                            g += data[i+1];
                            b += data[i+2];
                            count++;
                        }
                    }
                    
                    // On arrondit et on ajoute une opacité légère pour le côté "soft"
                    return `rgba(${Math.floor(r/count)}, ${Math.floor(g/count)}, ${Math.floor(b/count)}, 0.7)`;
                }

            } catch (err) {
                console.error("Erreur d'accès à l'écran:", err);
            }
        };
    </script>
</body>
</html>
