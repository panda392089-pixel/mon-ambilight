<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Optimisé</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }

        /* Le canvas prend tout l'écran et on lui applique le flou via CSS (Accélération GPU) */
        #renderCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            filter: blur(80px); /* Le flou CSS est plus performant que le flou JS */
            transform: scale(1.1); /* Évite les bords noirs dus au flou */
            z-index: 1;
        }

        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            color: white;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">ACTIVER L'IMMERSION</button>
    </div>

    <canvas id="renderCanvas"></canvas>
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const displayCanvas = document.getElementById("renderCanvas");
        const dctx = displayCanvas.getContext("2d", { alpha: false });
        
        const procCanvas = document.getElementById("procCanvas");
        const pctx = procCanvas.getContext("2d", { alpha: false });

        const activerAmbilight = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 160, height: 90, frameRate: 30 } // Résolution basse pour économiser le CPU
                });
                
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                
                // On travaille sur une toute petite grille pour l'analyse
                procCanvas.width = 3; 
                procCanvas.height = 3;
                
                // Le canvas de rendu est basse résolution mais étiré par le CSS
                displayCanvas.width = 160;
                displayCanvas.height = 90;

                const render = () => {
                    // 1. On dessine la vidéo sur le petit canvas de traitement
                    pctx.drawImage(video, 0, 0, 3, 3);
                    const data = pctx.getImageData(0, 0, 3, 3).data;

                    // 2. On récupère les couleurs des zones (Haut, Gauche, Droite, Bas)
                    const colors = {
                        top:    `rgb(${data[4], data[5], data[6]})`,    // Pixel central haut (approximatif)
                        left:   `rgb(${data[12], data[13], data[14]})`, // Milieu gauche
                        right:  `rgb(${data[20], data[21], data[22]})`, // Milieu droit
                        bottom: `rgb(${data[28], data[29], data[30]})`  // Milieu bas
                    };

                    // 3. On dessine des dégradés sur le canvas de rendu au lieu de manipuler du CSS
                    // Cela permet au GPU de gérer les transitions
                    drawAmbilight(colors);

                    // On limite à ~30 FPS pour soulager le CPU
                    setTimeout(() => {
                        requestAnimationFrame(render);
                    }, 33); 
                };

                function drawAmbilight(c) {
                    const w = displayCanvas.width;
                    const h = displayCanvas.height;

                    dctx.clearRect(0, 0, w, h);

                    // Création d'un gradient simple qui simule l'aura
                    let grad = dctx.createRadialGradient(w/2, h/2, 10, w/2, h/2, w/1.2);
                    grad.addColorStop(0, 'black');
                    grad.addColorStop(0.5, c.top);
                    grad.addColorStop(1, c.bottom);

                    dctx.fillStyle = grad;
                    dctx.fillRect(0, 0, w, h);
                }

                render();
            } catch (e) {
                console.error("Erreur:", e);
            }
        };

        btn.onclick = activerAmbilight;

        // Auto-click pour Touch Portal
        window.onload = () => {
            setTimeout(() => btn.click(), 500);
        };
    </script>
</body>
</html>
