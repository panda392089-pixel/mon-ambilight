<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ambilight Frame</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* cadre */
#frame{
    position:relative;
    width:90vw;
    height:90vh;
    border-top:20px solid red;
    border-left:20px solid red;
    border-right:20px solid red;
    box-shadow:
        0 -40px 120px red,
        -40px 0 120px red,
        40px 0 120px red;
}

/* canvas caché pour analyser l'image */
#capture{
    display:none;
}
</style>
</head>

<body>

<div id="frame"></div>
<canvas id="capture"></canvas>

<script>

const frame = document.getElementById("frame");
const canvas = document.getElementById("capture");
const ctx = canvas.getContext("2d");

async function startCapture(){

    const stream = await navigator.mediaDevices.getDisplayMedia({
        video:true
    });

    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    function update(){

        ctx.drawImage(video,0,0,canvas.width,canvas.height);

        const edge = 40;

        const top = ctx.getImageData(0,0,canvas.width,edge);
        const left = ctx.getImageData(0,0,edge,canvas.height);
        const right = ctx.getImageData(canvas.width-edge,0,edge,canvas.height);

        function averageColor(data){

            let r=0,g=0,b=0,count=0;

            for(let i=0;i<data.data.length;i+=4){

                r+=data.data[i];
                g+=data.data[i+1];
                b+=data.data[i+2];
                count++;
            }

            r=Math.floor(r/count);
            g=Math.floor(g/count);
            b=Math.floor(b/count);

            return `rgb(${r},${g},${b})`;
        }

        const topColor = averageColor(top);
        const leftColor = averageColor(left);
        const rightColor = averageColor(right);

        frame.style.borderTopColor = topColor;
        frame.style.borderLeftColor = leftColor;
        frame.style.borderRightColor = rightColor;

        frame.style.boxShadow =
            `0 -40px 120px ${topColor},
             -40px 0 120px ${leftColor},
             40px 0 120px ${rightColor}`;

        requestAnimationFrame(update);
    }

    update();
}

startCapture();

</script>

</body>
</html>
