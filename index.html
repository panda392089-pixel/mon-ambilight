<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Conteneur principal sans bordure visible */
        .ambilight-wrapper {
            position: relative;
            width: 90vw;
            height: 50.6vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Les sources de lumière : on utilise des halos radiaux */
        .light-engine {
            position: absolute;
            top: -20%; left: -20%;
            width: 140%; height: 140%;
            z-index: -1;
            /* Le flou est poussé au maximum pour casser toute forme géométrique */
            filter: blur(120px) saturate(200%) brightness(1.2);
            pointer-events: none;
        }

        .halo {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            opacity: 0.8;
            transition: background 0.2s ease-out;
        }

        /* Positionnement des 4 halos pour qu'ils se chevauchent doucement */
        #h-top    { top: 0; left: 15%; background: radial-gradient(circle, var(--c-top) 0%, transparent 70%); }
        #h-bottom { bottom: 0; left: 15%; background: radial-gradient(circle, var(--c-bottom) 0%, transparent 70%); }
        #h-left   { left: 0; top: 15%; background: radial-gradient(circle, var(--c-left) 0%, transparent 70%); }
        #h-right  { right: 0; top: 15%; background: radial-gradient(circle, var(--c-right) 0%, transparent 70%); }

        /* Setup OBS */
        #setup-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; cursor: pointer; font-family: sans-serif;
        }
        .instruction { border: 2px dashed #555; padding: 30px; border-radius: 15px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="setup-layer">
        <div class="instruction">Cliquer pour synchroniser le flux</div>
    </div>
    
    <div class="ambilight-wrapper">
        <div class="light-engine">
            <div id="h-top" class="halo" style="--c-top: transparent"></div>
            <div id="h-bottom" class="halo" style="--c-bottom: transparent"></div>
            <div id="h-left" class="halo" style="--c-left: transparent"></div>
            <div id="h-right" class="halo" style="--c-right: transparent"></div>
        </div>
        </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        const halos = {
            top: document.getElementById('h-top'),
            bottom: document.getElementById('h-bottom'),
            left: document.getElementById('h-left'),
            right: document.getElementById('h-right')
        };
        const setup = document.getElementById('setup-layer');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        setup.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setup.style.display = 'none';

                video.onloadedmetadata = () => {
                    canvas.width = 32; canvas.height = 18;
                    function update() {
                        if (video.paused || video.ended) return;
                        ctx.drawImage(video, 0, 0, 32, 18);
                        
                        // Calcul des couleurs avec une fonction simplifiée
                        halos.top.style.setProperty('--c-top', getAreaColor(0, 0, 32, 4));
                        halos.bottom.style.setProperty('--c-bottom', getAreaColor(0, 14, 32, 4));
                        halos.left.style.setProperty('--c-left', getAreaColor(0, 0, 4, 18));
                        halos.right.style.setProperty('--c-right', getAreaColor(28, 0, 4, 18));
                        
                        requestAnimationFrame(update);
                    }
                    update();
                };
            } catch (e) { console.error(e); }
        };

        function getAreaColor(x, y, w, h) {
            const data = ctx.getImageData(x, y, w, h).data;
            let r=0, g=0, b=0;
            for(let i=0; i<data.length; i+=16) { // On échantillonne 1 pixel sur 4 pour la fluidité
                r += data[i]; g += data[i+1]; b += data[i+2];
            }
            const count = data.length / 16;
            return `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
        }
    </script>
</body>
</html>
