<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Realistic Ambilight</title>

<style>

html,body{
margin:0;
background:black;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
}

video{
display:none;
}

#start{
position:fixed;
top:20px;
left:20px;
z-index:10;
padding:12px 20px;
font-size:15px;
background:#111;
color:white;
border:1px solid #333;
cursor:pointer;
}

</style>
</head>
<body>

<button id="start">Activer Ambilight</button>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

const SEGMENTS = 24
const EDGE = 70

let smoothColors = new Array(SEGMENTS).fill({r:0,g:0,b:0})

document.getElementById("start").onclick = async () => {

const stream = await navigator.mediaDevices.getDisplayMedia({video:true})
video.srcObject = stream

requestAnimationFrame(loop)

}

function avg(data){

let r=0,g=0,b=0,count=0

for(let i=0;i<data.length;i+=32){

r+=data[i]
g+=data[i+1]
b+=data[i+2]
count++

}

return {r:r/count,g:g/count,b:b/count}

}

function smooth(old,newc){

return{
r:old.r*0.8 + newc.r*0.2,
g:old.g*0.8 + newc.g*0.2,
b:old.b*0.8 + newc.b*0.2
}

}

function drawLight(color,x,y,w,h,dir){

let gradient

if(dir==="top"){

gradient = ctx.createLinearGradient(x,y,x,y+300)

gradient.addColorStop(0,`rgba(${color.r},${color.g},${color.b},0.9)`)
gradient.addColorStop(1,"rgba(0,0,0,0)")

}

if(dir==="left"){

gradient = ctx.createLinearGradient(x,y,x+300,y)

gradient.addColorStop(0,`rgba(${color.r},${color.g},${color.b},0.9)`)
gradient.addColorStop(1,"rgba(0,0,0,0)")

}

if(dir==="right"){

gradient = ctx.createLinearGradient(x,y,x-300,y)

gradient.addColorStop(0,`rgba(${color.r},${color.g},${color.b},0.9)`)
gradient.addColorStop(1,"rgba(0,0,0,0)")

}

ctx.fillStyle = gradient
ctx.fillRect(x,y,w,h)

}

function loop(){

if(video.readyState>=2){

let temp=document.createElement("canvas")
let tctx=temp.getContext("2d")

temp.width=video.videoWidth
temp.height=video.videoHeight

tctx.drawImage(video,0,0)

ctx.clearRect(0,0,canvas.width,canvas.height)

let segmentWidth = temp.width/SEGMENTS

for(let i=0;i<SEGMENTS;i++){

let img = tctx.getImageData(i*segmentWidth,0,segmentWidth,EDGE)

let c = avg(img.data)

smoothColors[i]=smooth(smoothColors[i],c)

let screenX = i*(canvas.width/SEGMENTS)

drawLight(
smoothColors[i],
screenX,
0,
canvas.width/SEGMENTS,
300,
"top"
)

}

let segmentHeight=temp.height/SEGMENTS

for(let i=0;i<SEGMENTS;i++){

let img = tctx.getImageData(0,i*segmentHeight,EDGE,segmentHeight)

let c = avg(img.data)

let sc = smooth({r:0,g:0,b:0},c)

let screenY = i*(canvas.height/SEGMENTS)

drawLight(sc,0,screenY,300,canvas.height/SEGMENTS,"left")

}

for(let i=0;i<SEGMENTS;i++){

let img = tctx.getImageData(temp.width-EDGE,i*segmentHeight,EDGE,segmentHeight)

let c = avg(img.data)

let sc = smooth({r:0,g:0,b:0},c)

let screenY = i*(canvas.height/SEGMENTS)

drawLight(sc,canvas.width,screenY,-300,canvas.height/SEGMENTS,"right")

}

}

requestAnimationFrame(loop)

}

</script>

</body>
</html>
