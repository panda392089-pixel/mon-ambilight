<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Ambilight - Cloud Diffusion</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        #ambilight-wrapper {
            position: absolute;
            top: -10vh; left: -10vw; /* On dépasse de l'écran pour que le nuage soit large */
            width: 120vw; height: 120vh;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        .glow-zone {
            position: absolute;
            mix-blend-mode: screen;
            /* Le secret du nuage : un flou immense et une opacité réduite */
            filter: blur(180px); 
            opacity: 0.8;
            border-radius: 50%;
            transition: background 0.2s ease-out;
        }

        /* Configuration des 8 zones principales pour un mélange fluide */
        .zone-top    { top: 5%; width: 40%; height: 40%; }
        .zone-side   { top: 30%; width: 35%; height: 50%; }
        .zone-bottom { bottom: 5%; width: 40%; height: 40%; }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: rgba(0,0,0,0.8); color: white;
            border: 1px solid #555; cursor: pointer; border-radius: 5px; z-index: 100;
        }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER LE NUAGE DE LUMIÈRE</button>
    
    <div id="ambilight-wrapper">
        <div id="z-tl" class="glow-zone zone-top" style="left: 10%;"></div>
        <div id="z-tr" class="glow-zone zone-top" style="right: 10%;"></div>
        <div id="z-ml" class="glow-zone zone-side" style="left: -5%;"></div>
        <div id="z-mr" class="glow-zone zone-side" style="right: -5%;"></div>
        <div id="z-bl" class="glow-zone zone-bottom" style="left: 15%;"></div>
        <div id="z-br" class="glow-zone zone-bottom" style="right: 15%;"></div>
    </div>
    
    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const wrapper = document.getElementById('ambilight-wrapper');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        const zones = {
            'z-tl': { x: 2, y: 2 }, 'z-tr': { x: 6, y: 2 },
            'z-ml': { x: 1, y: 4 }, 'z-mr': { x: 7, y: 4 },
            'z-bl': { x: 2, y: 6 }, 'z-br': { x: 6, y: 6 }
        };

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 160, height: 90, frameRate: 30 }
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                btn.style.display = 'none';
                wrapper.style.opacity = '1';

                video.onplaying = () => {
                    canvas.width = 8; canvas.height = 8;
                    render();
                };

                function render() {
                    if (video.paused || video.ended) return;
                    ctx.drawImage(video, 0, 0, 8, 8);
                    const data = ctx.getImageData(0, 0, 8, 8).data;

                    for (let id in zones) {
                        const pos = zones[id];
                        const i = (pos.y * 8 + pos.x) * 4;
                        
                        // Traitement "Nuage" : on sature et on évite le noir complet
                        let r = Math.max(data[i], 10);
                        let g = Math.max(data[i+1], 10);
                        let b = Math.max(data[i+2], 10);
                        
                        // Boost de vibrance pour l'effet "glow"
                        const color = `rgba(${r*1.2}, ${g*1.2}, ${b*1.2}, 0.6)`;
                        document.getElementById(id).style.background = 
                            `radial-gradient(circle, ${color} 0%, transparent 70%)`;
                    }
                    requestAnimationFrame(render);
                }
            } catch (err) { console.log(err); }
        };
    </script>
</body>
</html>
