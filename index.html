<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Diffusion</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #ambilight-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            filter: blur(120px); 
        }

        .glow-zone {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
            mix-blend-mode: screen;
            will-change: background;
        }

        #z-top { top: -20%; left: 10%; width: 80%; height: 40%; }
        #z-left { top: 10%; left: -20%; width: 40%; height: 80%; }
        #z-right { top: 10%; right: -20%; width: 40%; height: 80%; }
        #z-bottom { bottom: -20%; left: 10%; width: 80%; height: 40%; }

        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: white;
            font-family: sans-serif;
        }

        button {
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover { background: white; color: black; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">ACTIVER L'IMMERSION TOTALE</button>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-top" class="glow-zone"></div>
        <div id="z-left" class="glow-zone"></div>
        <div id="z-right" class="glow-zone"></div>
        <div id="z-bottom" class="glow-zone"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const canvas = document.getElementById("procCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const elements = {
            top: document.getElementById("z-top"),
            left: document.getElementById("z-left"),
            right: document.getElementById("z-right"),
            bottom: document.getElementById("z-bottom")
        };
        const zones = {
            top: { x: 1, y: 0 },
            left: { x: 0, y: 1 },
            right: { x: 2, y: 1 },
            bottom: { x: 1, y: 2 }
        };

        // LA LOGIQUE D'ACTIVATION
        const activerAmbilight = async () => {
            try {
                // IMPORTANT: Dans OBS, assurez-vous d'avoir déjà validé la source une fois
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 32, height: 18, frameRate: 60 }
                });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                canvas.width = 3;
                canvas.height = 3;

                const render = () => {
                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    for (let id in zones) {
                        const i = (zones[id].y * 3 + zones[id].x) * 4;
                        elements[id].style.backgroundColor = `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
                    }
                    video.requestVideoFrameCallback(render);
                };
                video.requestVideoFrameCallback(render);
            } catch (e) { 
                console.error("Erreur d'activation:", e); 
            }
        };

        // Écouteur de clic sur le bouton
        btn.onclick = activerAmbilight;

        // AUTO-DÉCLENCHEMENT POUR TOUCH PORTAL
        // Quand la page est rafraîchie via Touch Portal, on clique sur le bouton après 500ms
        window.onload = function() {
            setTimeout(() => {
                console.log("Tentative d'activation automatique...");
                btn.click();
            }, 500);
        };
    </script>
</body>
</html>
