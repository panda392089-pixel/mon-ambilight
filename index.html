<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ambilight EXTREME</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

#ambilight{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.zone{
position:absolute;
filter:blur(90px);
opacity:0.95;
}

.top{ top:0;height:35px }
.left{ left:0;width:35px }
.right{ right:0;width:35px }

#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
text-align:center;
}

button{
padding:18px 35px;
font-size:18px;
background:#111;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div id="ambilight"></div>

<div id="ui">
<h2 style="color:white">Ambilight EXTREME</h2>
<button id="start">Démarrer</button>
</div>

<canvas id="capture"></canvas>

<script>

const topZones=120
const sideZones=60

const ambilight=document.getElementById("ambilight")

function createZones(){

for(let i=0;i<topZones;i++){

let d=document.createElement("div")
d.className="zone top"

d.style.width=(100/topZones)+"%"
d.style.left=(i*(100/topZones))+"%"

ambilight.appendChild(d)

}

for(let i=0;i<sideZones;i++){

let l=document.createElement("div")
l.className="zone left"

l.style.height=(100/sideZones)+"%"
l.style.top=(i*(100/sideZones))+"%"

ambilight.appendChild(l)

let r=document.createElement("div")
r.className="zone right"

r.style.height=(100/sideZones)+"%"
r.style.top=(i*(100/sideZones))+"%"

ambilight.appendChild(r)

}

}

createZones()

const canvas=document.getElementById("capture")
const ctx=canvas.getContext("2d")

let smoothMemory={}

function smooth(id,col){

if(!smoothMemory[id]) smoothMemory[id]=col

let o=smoothMemory[id]

o.r+=(col.r-o.r)*0.25
o.g+=(col.g-o.g)*0.25
o.b+=(col.b-o.b)*0.25

return o

}

function average(data){

let r=0,g=0,b=0,c=0

for(let i=0;i<data.data.length;i+=4){

r+=data.data[i]
g+=data.data[i+1]
b+=data.data[i+2]

c++

}

r/=c
g/=c
b/=c

let boost=1.2

return {
r:Math.min(r*boost,255),
g:Math.min(g*boost,255),
b:Math.min(b*boost,255)
}

}

async function start(){

document.getElementById("ui").remove()

const stream=await navigator.mediaDevices.getDisplayMedia({
video:true
})

const video=document.createElement("video")
video.srcObject=stream
await video.play()

canvas.width=video.videoWidth
canvas.height=video.videoHeight

function loop(){

ctx.drawImage(video,0,0)

const topSize=canvas.width/topZones
const sideSize=canvas.height/sideZones

const tops=document.querySelectorAll(".top")

tops.forEach((node,i)=>{

let img=ctx.getImageData(i*topSize,0,topSize,40)

let col=average(img)
col=smooth("t"+i,col)

node.style.background=`rgb(${col.r},${col.g},${col.b})`

})

const lefts=document.querySelectorAll(".left")

lefts.forEach((node,i)=>{

let img=ctx.getImageData(0,i*sideSize,40,sideSize)

let col=average(img)
col=smooth("l"+i,col)

node.style.background=`rgb(${col.r},${col.g},${col.b})`

})

const rights=document.querySelectorAll(".right")

rights.forEach((node,i)=>{

let img=ctx.getImageData(canvas.width-40,i*sideSize,40,sideSize)

let col=average(img)
col=smooth("r"+i,col)

node.style.background=`rgb(${col.r},${col.g},${col.b})`

})

requestAnimationFrame(loop)

}

loop()

}

document.getElementById("start").onclick=start

</script>

</body>
</html>
