<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* Le conteneur principal qui contient le "vide" au centre */
        #ambilight-container {
            position: relative;
            width: 90vw;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Les halos lumineux (Gauche, Haut, Droite) */
        .glow {
            position: absolute;
            filter: blur(80px); /* Flou très large pour l'aspect réaliste */
            opacity: 0.8;
            transition: background 0.2s ease;
            pointer-events: none;
        }

        #glow-top {
            top: -50px;
            left: 0;
            right: 0;
            height: 150px;
            border-radius: 50% 50% 0 0;
        }

        #glow-left {
            top: 0;
            bottom: 0;
            left: -50px;
            width: 150px;
            border-radius: 50% 0 0 50%;
        }

        #glow-right {
            top: 0;
            bottom: 0;
            right: -50px;
            width: 150px;
            border-radius: 0 50% 50% 0;
        }

        /* Interface de contrôle */
        #controls {
            position: absolute;
            z-index: 100;
            color: white;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        video, canvas {
            display: none; /* On cache la source vidéo brute */
        }
    </style>
</head>
<body>

    <div id="controls">
        <h2>Simulateur Ambilight Direct</h2>
        <p>Capturez votre jeu pour projeter les couleurs</p>
        <button id="startBtn">Démarrer l'Ambilight</button>
    </div>

    <div id="ambilight-container">
        <div id="glow-top" class="glow"></div>
        <div id="glow-left" class="glow"></div>
        <div id="glow-right" class="glow"></div>
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        
        const glows = {
            top: document.getElementById('glow-top'),
            left: document.getElementById('glow-left'),
            right: document.getElementById('glow-right')
        };

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "never" },
                    audio: false
                });
                video.srcObject = stream;
                document.getElementById('controls').style.display = 'none';
                updateAmbilight();
            } catch (err) {
                console.error("Erreur de capture : " + err);
            }
        });

        function updateAmbilight() {
            if (video.paused || video.ended) return;

            // On dessine la vidéo dans un petit canvas pour optimiser les performances
            canvas.width = 160;
            canvas.height = 90;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Analyse des zones
            // Haut : échantillon sur la ligne supérieure
            const topColor = getAverageColor(0, 0, canvas.width, 10);
            // Gauche : échantillon sur la colonne de gauche
            const leftColor = getAverageColor(0, 0, 10, canvas.height);
            // Droite : échantillon sur la colonne de droite
            const rightColor = getAverageColor(canvas.width - 10, 0, 10, canvas.height);

            // Application des couleurs avec un dégradé radial pour la douceur
            glows.top.style.background = `radial-gradient(circle, ${topColor} 0%, transparent 70%)`;
            glows.left.style.background = `radial-gradient(circle, ${leftColor} 0%, transparent 70%)`;
            glows.right.style.background = `radial-gradient(circle, ${rightColor} 0%, transparent 70%)`;

            requestAnimationFrame(updateAmbilight);
        }

        function getAverageColor(x, y, w, h) {
            const imageData = ctx.getImageData(x, y, w, h).data;
            let r = 0, g = 0, b = 0;
            const count = imageData.length / 4;

            for (let i = 0; i < imageData.length; i += 4) {
                r += imageData[i];
                g += imageData[i + 1];
                b += imageData[i + 2];
            }

            return `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
        }
    </script>
</body>
</html>
