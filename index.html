<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Final Optimized</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        
        #ambilight {
            position: fixed;
            top: -10%; left: -10%; /* Léger débordement pour éviter les bords nets */
            width: 120%; height: 120%;
            /* Optimisation : 'backface-visibility' et 'transform' 
               forcent la création d'une couche hardware (Compositing Layer)
            */
            filter: blur(80px) saturate(1.8);
            transform: translateZ(0); 
            will-change: filter;
        }

        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        button { padding: 15px 30px; background: none; border: 2px solid #fff; color: #fff; cursor: pointer; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="ui"><button id="btn">ACTIVER L'IMMERSION</button></div>
    <canvas id="ambilight"></canvas>

    <script>
        const btn = document.getElementById("btn");
        const canvas = document.getElementById("ambilight");
        // alpha: false pour optimiser le blending GPU
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

        const start = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 80, height: 45, frameRate: 24 } // Résolution encore plus basse
                });
                
                const video = document.createElement("video");
                video.srcObject = stream;
                video.muted = true;
                await video.play();

                document.getElementById("ui").style.display = "none";
                
                // On descend à une résolution ridicule : 80x45 est largement suffisant 
                // pour une ambiance colorée après un flou de 80px.
                canvas.width = 80;
                canvas.height = 45;
                ctx.imageSmoothingEnabled = false; 

                const draw = () => {
                    // Un seul appel drawImage au lieu de 4. 
                    // Le GPU gère l'interpolation des couleurs lors du flou CSS.
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(draw);
                };
                
                draw();

                // Libération de la mémoire si le stream s'arrête
                stream.getVideoTracks()[0].onended = () => location.reload();

            } catch (e) { console.error("Erreur ou annulation :", e); }
        };

        btn.onclick = start;
        // On évite le click forcé auto (souvent bloqué par les navigateurs sans interaction réelle)
    </script>
</body>
</html>
