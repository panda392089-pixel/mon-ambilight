<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ambilight Ultra-Diffusion Pro</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #ambilight-wrapper {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            pointer-events: none;
            z-index: -1;
            /* Augmentation du flou pour une fusion parfaite des couleurs */
            filter: blur(150px) saturate(1.5); 
            display: grid;
            /* Grille de 3x3 pour couvrir les bords et les coins */
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 2fr 1fr;
        }

        .glow-zone {
            width: 100%;
            height: 100%;
            transition: background 0.1s linear; /* Lissage subtil */
            will-change: background;
        }

        /* On laisse le centre vide (grid-area: 2/2) pour ne pas polluer l'image */

        #ui-layer {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover { background: white; color: black; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn">ACTIVER L'IMMERSION TOTALE</button>
    </div>

    <div id="ambilight-wrapper">
        <div id="z-0" class="glow-zone" style="grid-area: 1/1"></div>
        <div id="z-1" class="glow-zone" style="grid-area: 1/2"></div>
        <div id="z-2" class="glow-zone" style="grid-area: 1/3"></div>
        <div id="z-3" class="glow-zone" style="grid-area: 2/1"></div>
        <div id="z-5" class="glow-zone" style="grid-area: 2/3"></div>
        <div id="z-6" class="glow-zone" style="grid-area: 3/1"></div>
        <div id="z-7" class="glow-zone" style="grid-area: 3/2"></div>
        <div id="z-8" class="glow-zone" style="grid-area: 3/3"></div>
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const btn = document.getElementById("start-btn");
        const canvas = document.getElementById("procCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
        
        // On passe sur une grille 3x3 (9 zones) pour capturer les coins
        const zonesElements = [];
        for(let i=0; i<9; i++) {
            if(i === 4) continue; // On ignore le centre
            zonesElements[i] = document.getElementById(`z-${i}`);
        }

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "never" },
                    audio: false
                });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                document.getElementById("ui-layer").style.display = "none";
                
                // Résolution ultra basse pour la performance, mais suffisante pour des couleurs moyennes
                canvas.width = 3;
                canvas.height = 3;

                const render = () => {
                    ctx.drawImage(video, 0, 0, 3, 3);
                    const data = ctx.getImageData(0, 0, 3, 3).data;

                    for (let i = 0; i < 9; i++) {
                        if (i === 4) continue;
                        const pixelIdx = i * 4;
                        const r = data[pixelIdx];
                        const g = data[pixelIdx + 1];
                        const b = data[pixelIdx + 2];
                        
                        // Application de la couleur
                        zonesElements[i].style.backgroundColor = `rgb(${r},${g},${b})`;
                    }
                    
                    if ('requestVideoFrameCallback' in video) {
                        video.requestVideoFrameCallback(render);
                    } else {
                        requestAnimationFrame(render);
                    }
                };
                render();
                
            } catch (e) { console.error("Erreur d'accès à l'écran:", e); }
        };
    </script>
</body>
</html>
